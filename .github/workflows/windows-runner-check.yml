name: windows-runner-check

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  check:
    name: Runner Health Check
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    steps:
      # Checkout so we can read the build workflow and patches
      - uses: actions/checkout@v4

      # Runner's git-bash PATH does not include C:\Python314 by default —
      # surface python3 for subsequent bash steps.
      - name: Prepend Python to PATH
        shell: bash
        run: |
          echo "C:\Python314" >> "$GITHUB_PATH"
          echo "C:\Python314\Scripts" >> "$GITHUB_PATH"

      - name: Verify CI matrix pins (vcpkg / Dawn / green JSON)
        shell: bash
        run: |
          set -euo pipefail
          python "$GITHUB_WORKSPACE/config/verify_webkit_pin_commit.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
            --check-vcpkg --check-green-json

      # Set up the EXACT environment the build will use, then audit it.
      # This runs VsDevCmd + the same PATH as the Build step so every
      # check reflects what the build will actually see.
      - name: Runner Audit
        shell: cmd
        run: |
          @echo off
          setlocal enabledelayedexpansion

          echo.
          echo ============================================================
          echo  Runner Health Check
          echo ============================================================

          REM ── Load the same environment the Build step uses ──
          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64 >NUL 2>&1
          if errorlevel 1 (
            echo   FAIL  VsDevCmd.bat failed to load
            exit /b 1
          )
          echo   OK    VsDevCmd.bat loaded

          set "PATH=C:\Bootstrap\toolbin;C:\Program Files\Git\cmd;C:\Ruby34-x64\bin;C:\Python314;C:\Python314\Scripts;C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;C:\Strawberry\perl\bin;C:\Program Files\GitHub CLI;%PATH%"
          set "VCPKG_ROOT=C:\vcpkg"

          set "FAIL=0"
          set "PASS=0"
          set "TOTAL=0"

          echo.
          echo == Account ==
          whoami
          echo.

          echo == Disk Space ==
          for /f "tokens=3" %%a in ('dir C:\ ^| findstr /C:"bytes free"') do (
            echo   OK    %%a bytes free on C:
          )
          echo.

          echo == Binaries (existence) ==
          for %%B in (
            "C:\Program Files\Git\cmd\git.exe"
            "C:\Program Files\Git\usr\bin\bash.exe"
            "C:\Program Files\Git\usr\bin\tar.exe"
            "C:\Strawberry\perl\bin\perl.exe"
            "C:\Ruby34-x64\bin\ruby.exe"
            "C:\Python314\python.exe"
            "C:\Program Files\CMake\bin\cmake.exe"
            "C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja\ninja.exe"
            "C:\Program Files\LLVM\bin\clang-cl.exe"
            "C:\Program Files\LLVM\bin\lld-link.exe"
            "C:\Bootstrap\toolbin\sccache.exe"
            "C:\vcpkg\vcpkg.exe"
            "C:\Program Files\GitHub CLI\gh.exe"
            "C:\Program Files\PowerShell\7\pwsh.exe"
            "C:\BuildTools\Common7\Tools\VsDevCmd.bat"
          ) do (
            set /a TOTAL+=1
            if exist %%B (
              echo   OK    %%~nxB
              set /a PASS+=1
            ) else (
              echo   FAIL  %%B NOT FOUND
              set "FAIL=1"
            )
          )
          echo.

          echo == Tool Versions (proves they run in build env) ==
          for %%T in (cmake ninja clang-cl perl ruby python git gh sccache) do (
            set /a TOTAL+=1
            %%T --version >NUL 2>&1
            if not errorlevel 1 (
              echo   OK    %%T responds to --version
              set /a PASS+=1
            ) else (
              echo   FAIL  %%T --version failed
              set "FAIL=1"
            )
          )
          REM vcpkg binary already checked above; its 'version' cmd has quirky exit codes
          set /a TOTAL+=1
          "C:\vcpkg\vcpkg.exe" version >NUL 2>&1
          echo   OK    vcpkg (binary exists, version subcommand has known non-zero exit)
          set /a PASS+=1
          echo.

          echo == Write Permissions ==
          for %%D in (
            "C:\W"
            "C:\vcpkg\buildtrees"
            "C:\vcpkg\installed"
            "C:\vcpkg\packages"
            "C:\vcpkg\downloads"
            "C:\Bootstrap\toolbin"
            "C:\Bootstrap\sccache-gh\windows-webgpu-dawn"
          ) do (
            set /a TOTAL+=1
            if not exist %%D mkdir %%D 2>NUL
            echo _test > %%D\_runner_check.tmp 2>NUL
            if exist %%D\_runner_check.tmp (
              del %%D\_runner_check.tmp
              echo   OK    %%D writable
              set /a PASS+=1
            ) else (
              echo   FAIL  %%D NOT WRITABLE
              set "FAIL=1"
            )
          )
          echo.

          echo == Patches (exist in repo) ==
          set /a TOTAL+=1
          set "PATCH_COUNT=0"
          for %%P in (webkit\patches\windows\*.patch) do set /a PATCH_COUNT+=1
          if !PATCH_COUNT! GTR 0 (
            echo   OK    !PATCH_COUNT! windows patches found
            set /a PASS+=1
          ) else (
            echo   FAIL  no windows patches found in webkit\patches\windows\
            set "FAIL=1"
          )
          echo.

          echo == Draft Release Access ==
          set /a TOTAL+=1
          gh release view webkit-pin --json tagName >NUL 2>&1
          if not errorlevel 1 (
            echo   OK    webkit-pin release accessible
            set /a PASS+=1
          ) else (
            echo   WARN  cannot access webkit-pin release (draft needs contents:write token)
            echo         This is expected in standalone runs. Build workflow provides its own token.
            set /a PASS+=1
          )
          echo.

          echo ============================================================
          echo  !PASS!/!TOTAL! checks passed
          echo ============================================================
          if "!FAIL!"=="1" (
            echo ::error::Runner health check FAILED
            exit /b 1
          )
          echo Runner health check PASSED.
