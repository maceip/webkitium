name: windows-build

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-windows-build
  cancel-in-progress: false

jobs:
  build:
    name: Windows WebKit Build
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    steps:
      - uses: actions/checkout@v4

      # ── Preflight: fail in 10s instead of 10m ──────────────────────
      # Validates every tool exists, runs, and has the permissions
      # the build will need.  If this passes, the build environment
      # is sound and any later failure is a real compile error.
      - name: Preflight
        shell: cmd
        run: |
          @echo off
          setlocal enabledelayedexpansion
          set "FAIL=0"

          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          if errorlevel 1 (
            echo ::error::VsDevCmd.bat failed
            exit /b 1
          )

          set "PATH=C:\Bootstrap\toolbin;C:\Program Files\Git\cmd;C:\Ruby34-x64\bin;C:\Python314;C:\Python314\Scripts;C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;C:\Strawberry\perl\bin;%PATH%"

          echo ── Checking tool binaries ──
          for %%T in (
            "git"   "C:\Program Files\Git\cmd\git.exe"
            "bash"  "C:\Program Files\Git\usr\bin\bash.exe"
            "perl"  "C:\Strawberry\perl\bin\perl.exe"
            "ruby"  "C:\Ruby34-x64\bin\ruby.exe"
            "python" "C:\Python314\python.exe"
            "cmake" "C:\Program Files\CMake\bin\cmake.exe"
            "ninja" "C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja\ninja.exe"
            "clang-cl" "C:\Program Files\LLVM\bin\clang-cl.exe"
            "lld-link" "C:\Program Files\LLVM\bin\lld-link.exe"
            "sccache" "C:\Bootstrap\toolbin\sccache.exe"
            "vcpkg" "C:\vcpkg\vcpkg.exe"
          ) do (
            if exist %%T (
              echo OK    %%T
            ) else (
              echo MISS  %%T
              set "FAIL=1"
            )
          )

          echo.
          echo ── Checking tool functionality ──
          cmake --version >NUL 2>&1 || (echo ::error::cmake not functional & set "FAIL=1")
          ninja --version >NUL 2>&1 || (echo ::error::ninja not functional & set "FAIL=1")
          clang-cl --version >NUL 2>&1 || (echo ::error::clang-cl not functional & set "FAIL=1")
          perl -v >NUL 2>&1 || (echo ::error::perl not functional & set "FAIL=1")
          echo OK    tools respond to --version

          echo.
          echo ── Checking write permissions ──
          set "VCPKG_ROOT=C:\vcpkg"

          if not exist "C:\vcpkg\buildtrees" mkdir "C:\vcpkg\buildtrees"
          echo test > "C:\vcpkg\buildtrees\_preflight_test.tmp" 2>NUL
          if exist "C:\vcpkg\buildtrees\_preflight_test.tmp" (
            del "C:\vcpkg\buildtrees\_preflight_test.tmp"
            echo OK    vcpkg buildtrees writable
          ) else (
            echo ::error::Cannot write to C:\vcpkg\buildtrees
            set "FAIL=1"
          )

          if not exist "C:\vcpkg\installed" mkdir "C:\vcpkg\installed"
          echo test > "C:\vcpkg\installed\_preflight_test.tmp" 2>NUL
          if exist "C:\vcpkg\installed\_preflight_test.tmp" (
            del "C:\vcpkg\installed\_preflight_test.tmp"
            echo OK    vcpkg installed writable
          ) else (
            echo ::error::Cannot write to C:\vcpkg\installed
            set "FAIL=1"
          )

          set "SCCACHE_DIR=C:\Bootstrap\sccache-gh\windows-webgpu-dawn"
          if not exist "%SCCACHE_DIR%" mkdir "%SCCACHE_DIR%"
          echo test > "%SCCACHE_DIR%\_preflight_test.tmp" 2>NUL
          if exist "%SCCACHE_DIR%\_preflight_test.tmp" (
            del "%SCCACHE_DIR%\_preflight_test.tmp"
            echo OK    sccache dir writable
          ) else (
            echo ::error::Cannot write to %SCCACHE_DIR%
            set "FAIL=1"
          )

          if not exist "C:\W" mkdir "C:\W"
          echo test > "C:\W\_preflight_test.tmp" 2>NUL
          if exist "C:\W\_preflight_test.tmp" (
            del "C:\W\_preflight_test.tmp"
            echo OK    build root C:\W writable
          ) else (
            echo ::error::Cannot write to C:\W
            set "FAIL=1"
          )

          echo.
          echo ── Disk space ──
          for /f "tokens=3" %%a in ('dir C:\ ^| findstr /C:"bytes free"') do (
            echo Free: %%a bytes on C:
          )

          echo.
          if "!FAIL!"=="1" (
            echo ::error::Preflight failed. Fix the runner before retrying.
            exit /b 1
          )
          echo Preflight OK.

      # ── Download, extract, and patch ───────────────────────────────
      - name: Prepare Source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SRC_WIN='C:/W/webkit-src'
          SRC="$(cygpath -u "$SRC_WIN")"
          ARCHIVE="$RUNNER_TEMP/webkit-pin.tar.gz"
          rm -rf "$SRC"
          mkdir -p "$SRC"

          # Download the four split parts from the webkit-pin release
          cd "$RUNNER_TEMP"
          gh release download webkit-pin \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "webkit-pin.tar.gz.part-*"

          # Strip stray \r from filenames (Windows gh can leave CRLF artefacts)
          shopt -s nullglob
          for f in webkit-pin.tar.gz.part-*$'\r'; do
            [[ -e "$f" ]] && mv -- "$f" "${f%$'\r'}"
          done

          # Stitch parts into single tarball
          parts=( webkit-pin.tar.gz.part-* )
          if (( ${#parts[@]} == 0 )); then
            echo "::error::No tarball parts found after download"
            exit 1
          fi
          echo "Stitching ${#parts[@]} parts..."
          cat "${parts[@]}" > "$ARCHIVE"
          rm -f webkit-pin.tar.gz.part-*

          echo "Tarball: $(du -h "$ARCHIVE" | cut -f1)"

          # Extract, excluding paths that contain macOS/iOS framework symlinks
          # and test suites not needed for a Windows build.  Tolerate warnings
          # from any remaining symlink entries inside Source/.
          tar -xzf "$ARCHIVE" --strip-components=1 -C "$SRC" \
            --exclude='*/LayoutTests/*' \
            --exclude='*/PerformanceTests/*' \
            --exclude='*/WebKitLibraries/SDKs/*' \
            --exclude='*/Websites/*' \
            --exclude='*/JSTests/*' \
            || true

          rm -f "$ARCHIVE"

          # Verify the source tree actually arrived
          if [[ ! -d "$SRC/Source" ]]; then
            echo "::error::Extraction failed -- Source/ directory missing"
            exit 1
          fi
          echo "Source ready at $SRC_WIN"
          ls "$SRC" | head -20

          # Apply patches (strip CRLF -- git apply requires LF in patches)
          applied=0
          for patch in "$GITHUB_WORKSPACE"/webkit/patches/common/* "$GITHUB_WORKSPACE"/webkit/patches/windows/*; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            clean="$RUNNER_TEMP/$(basename "$patch")"
            sed 's/\r$//' "$patch" > "$clean"
            git -C "$SRC" apply --check --whitespace=nowarn --unidiff-zero "$clean"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$clean"
            applied=$((applied + 1))
          done
          echo "Applied $applied patches."

      # ── Build ──────────────────────────────────────────────────────
      - name: Build
        shell: cmd
        run: |
          @echo on
          setlocal
          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b %errorlevel%

          set "SRC=C:\W\webkit-src"
          set "PATH=C:\Bootstrap\toolbin;C:\Program Files\Git\cmd;C:\Ruby34-x64\bin;C:\Python314;C:\Python314\Scripts;C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;C:\Strawberry\perl\bin;%PATH%"
          set "VCPKG_ROOT=C:\vcpkg"
          set "SCCACHE_DIR=C:\Bootstrap\sccache-gh\windows-webgpu-dawn"
          if not exist "%SCCACHE_DIR%" mkdir "%SCCACHE_DIR%"
          set "SCCACHE_CACHE_SIZE=50G"
          set "SCCACHE_IDLE_TIMEOUT=0"
          C:\Bootstrap\toolbin\sccache.exe --start-server >NUL 2>&1
          C:\Bootstrap\toolbin\sccache.exe --zero-stats

          cd /d "%SRC%"
          perl Tools\Scripts\build-webkit --release --win --makeargs=-j8 ^
            -DCMAKE_C_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_CXX_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_LINKER=C:/Progra~1/LLVM/bin/lld-link.exe ^
            -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_SHARED_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_MODULE_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON ^
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded ^
            -DCMAKE_C_FLAGS="-D_CRT_SECURE_NO_WARNINGS -flto=thin" ^
            -DCMAKE_CXX_FLAGS="-D_CRT_SECURE_NO_WARNINGS -flto=thin" ^
            -DCMAKE_C_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-webkit ^
            -DVCPKG_INSTALLED_DIR=C:/vcpkg/installed ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            --webgpu -DENABLE_EXPERIMENTAL_FEATURES=ON -DENABLE_WEBXR=OFF
          if errorlevel 1 exit /b %errorlevel%

          C:\Bootstrap\toolbin\sccache.exe --show-stats

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            C:\W\webkit-src\WebKitBuild\Release\bin
            C:\W\webkit-src\WebKitBuild\Release\CMakeCache.txt
            C:\W\webkit-src\WebKitBuild\Release\vcpkg-manifest-install.log
          if-no-files-found: warn
