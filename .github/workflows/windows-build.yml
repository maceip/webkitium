name: windows-release

# Operational rule
# When you re-cut webkit-pin or bump Dawn / vcpkg:
#
# Update config/webkit-build-matrix.json.
# Update config/vcpkg-configuration.json if the Dawn baseline changes.
# Update config/windows-webgpu-dawn-green.json if you use it as a green reference (CI will fail if it disagrees with the matrix).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-windows-build
  cancel-in-progress: false

jobs:
  preflight:
    name: Runner Health Check
    uses: ./.github/workflows/windows-runner-check.yml

  build:
    name: Windows WebKit Build
    needs: [preflight]
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    steps:
      - uses: actions/checkout@v4

      # Runner's git-bash PATH does not include C:\Python314 by default —
      # surface python3 for all bash steps in this job.
      - name: Prepend Python to PATH
        shell: bash
        run: |
          echo "C:\Python314" >> "$GITHUB_PATH"
          echo "C:\Python314\Scripts" >> "$GITHUB_PATH"

      - name: Load CI matrix into environment
        shell: bash
        run: |
          set -euo pipefail
          python "$GITHUB_WORKSPACE/config/ci_matrix_env.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" >> "$GITHUB_ENV"

      - name: Verify matrix, vcpkg (Dawn), and green JSON alignment
        shell: bash
        run: |
          set -euo pipefail
          python "$GITHUB_WORKSPACE/config/verify_webkit_pin_commit.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
            --check-vcpkg --check-green-json

      # ── Download, extract, and patch ───────────────────────────────
      - name: Prepare Source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          command -v gh >/dev/null 2>&1 || { echo "::error::gh CLI not found"; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "::error::git not found on PATH"; exit 1; }

          SRC_WIN='C:/W/webkit-src'
          SRC="$(cygpath -u "$SRC_WIN")"
          ARCHIVE="$RUNNER_TEMP/webkit-pin.tar.gz"

          # Cleanup step at end of workflow guarantees this is gone,
          # but handle stragglers defensively
          if [ -d "$SRC" ]; then
            rm -rf "$SRC" || cmd //c "rd /s /q \"$SRC_WIN\"" 2>/dev/null || true
          fi
          mkdir -p "$SRC"

          # Download the four split parts from the webkit-pin release
          cd "$RUNNER_TEMP"
          gh release download "${WEBKIT_PIN_RELEASE_TAG:?WEBKIT_PIN_RELEASE_TAG missing}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${WEBKIT_PIN_PART_GLOB:?WEBKIT_PIN_PART_GLOB missing}"

          # Strip stray \r from filenames (Windows gh can leave CRLF artefacts)
          shopt -s nullglob
          for f in ${WEBKIT_PIN_PART_GLOB}$'\r'; do
            [[ -e "$f" ]] && mv -- "$f" "${f%$'\r'}"
          done

          # Stitch parts into single tarball (nullglob already on from CRLF rename loop)
          parts=( ${WEBKIT_PIN_PART_GLOB} )
          if (( ${#parts[@]} == 0 )); then
            echo "::error::No tarball parts found after download"
            exit 1
          fi
          echo "Stitching ${#parts[@]} parts..."
          # Bash glob expansion is already sorted by LC_COLLATE (aa, ab, ac, ad).
          # Earlier `sort -V` call resolved to Windows sort.exe on git-bash PATH
          # and failed with "-V: system cannot find the file specified".
          cat "${parts[@]}" > "$ARCHIVE"
          rm -f ${WEBKIT_PIN_PART_GLOB}
          shopt -u nullglob
          [[ -s "$ARCHIVE" ]] || { echo "::error::Stitched webkit-pin archive is empty"; exit 1; }

          echo "Tarball: $(du -h "$ARCHIVE" | cut -f1)"

          # Extract, excluding paths that contain macOS/iOS framework symlinks
          # and test suites not needed for a Windows build.  Tolerate warnings
          # from any remaining symlink entries inside Source/.
          tar -xzf "$ARCHIVE" --strip-components=1 -C "$SRC" \
            --exclude='*/LayoutTests/*' \
            --exclude='*/WebKitLibraries/SDKs/*' \
            --exclude='*/Websites/*' \
            --exclude='*/JSTests/*' \
            || true

          rm -f "$ARCHIVE"

          # Verify the source tree actually arrived
          if [[ ! -d "$SRC/Source" ]]; then
            echo "::error::Extraction failed -- Source/ directory missing"
            exit 1
          fi
          python "$GITHUB_WORKSPACE/config/verify_webkit_pin_commit.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
            --webkit-root "$SRC"
          echo "Source ready at $SRC_WIN"
          ls "$SRC" | head -20

          # Fetch LiteRT-LM for WebNN backend (ref from config/webkit-build-matrix.json)
          LITERT_REF="$(
            python -c "import json, pathlib; print(json.load(pathlib.Path('$GITHUB_WORKSPACE/config/webkit-build-matrix.json').open())['webnn']['litertLm']['gitRef'])"
          )"
          LITERT_URL="$(
            python -c "import json, pathlib; print(json.load(pathlib.Path('$GITHUB_WORKSPACE/config/webkit-build-matrix.json').open())['webnn']['litertLm']['gitUrl'])"
          )"
          LITERT="$RUNNER_TEMP/litert-lm"
          if [ ! -d "$LITERT/.git" ]; then
            git clone --depth 1 --branch "$LITERT_REF" "$LITERT_URL" "$LITERT"
            (cd "$LITERT" && git lfs pull --include="prebuilt/windows_x86_64/*")
          fi
          echo "LiteRT-LM: $(ls "$LITERT/prebuilt/windows_x86_64/"*.dll 2>/dev/null | wc -l) DLLs"

          # Apply patches (strip CRLF -- git apply requires LF in patches)
          applied=0
          for patch in \
            "$GITHUB_WORKSPACE"/webkit/patches/common/*.patch \
            "$GITHUB_WORKSPACE"/webkit/patches/windows/*.patch \
            "$GITHUB_WORKSPACE"/changes/webnn-service/patches/common/*.patch \
            "$GITHUB_WORKSPACE"/changes/webnn-service/patches/windows/*.patch; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            clean="$RUNNER_TEMP/$(basename "$patch")"
            sed 's/\r$//' "$patch" > "$clean"
            git -C "$SRC" apply --check --whitespace=nowarn --unidiff-zero "$clean"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$clean"
            applied=$((applied + 1))
          done
          echo "Applied $applied patches."
          echo "WEBKITIUM_BROWSER_SHELL_TARGET=windows" >> "$GITHUB_ENV"

      # ── Build ──────────────────────────────────────────────────────
      - name: Build
        shell: cmd
        run: |
          @echo on
          setlocal
          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b %errorlevel%

          set "SRC=C:\W\webkit-src"
          REM Strawberry Perl ships its own ccache + GCC in C:\Strawberry\c\bin.
          REM Strip it so CMake doesn't find its ccache or gcc.
          set "PATH=%PATH:C:\Strawberry\c\bin;=%"
          REM Force clang-cl so build-webkit skips its own detection
          REM (latestVisualStudioCompilerPath can fail with bsd_glob on some runners).
          set "CC=C:\Program Files\LLVM\bin\clang-cl.exe"
          set "CXX=C:\Program Files\LLVM\bin\clang-cl.exe"
          set "PATH=C:\Bootstrap\toolbin;C:\Program Files\Git\cmd;C:\Ruby34-x64\bin;C:\Python314;C:\Python314\Scripts;C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;C:\Strawberry\perl\bin;%PATH%"
          set "VCPKG_ROOT=C:\vcpkg"
          REM LiteRT-LM for WebNN: headers at repo root, DLLs in prebuilt/windows_x86_64
          set "CMAKE_PREFIX_PATH=%RUNNER_TEMP%\litert-lm;%RUNNER_TEMP%\litert-lm\prebuilt\windows_x86_64"
          set "SCCACHE_DIR=C:\Bootstrap\sccache-gh\windows-webgpu-dawn"
          if not exist "%SCCACHE_DIR%" mkdir "%SCCACHE_DIR%"
          set "SCCACHE_CACHE_SIZE=50G"
          set "SCCACHE_IDLE_TIMEOUT=0"
          C:\Bootstrap\toolbin\sccache.exe --start-server >NUL 2>&1
          C:\Bootstrap\toolbin\sccache.exe --zero-stats

          cd /d "%SRC%"
          perl Tools\Scripts\build-webkit --release --win --makeargs=-j%NUMBER_OF_PROCESSORS% ^
            -DCMAKE_C_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_CXX_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_LINKER=C:/Progra~1/LLVM/bin/lld-link.exe ^
            -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_SHARED_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_MODULE_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON ^
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded ^
            -DCMAKE_C_FLAGS="-D_CRT_SECURE_NO_WARNINGS -flto=thin -Wno-missing-format-attribute" ^
            -DCMAKE_CXX_FLAGS="-D_CRT_SECURE_NO_WARNINGS -flto=thin -Wno-missing-format-attribute" ^
            -DCMAKE_C_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-webkit ^
            -DVCPKG_INSTALLED_DIR=C:/vcpkg/installed ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            %WINDOWS_BUILD_WEBKIT_EXTRA% -DENABLE_EXPERIMENTAL_FEATURES=%WEBKIT_CMAKE_ENABLE_EXPERIMENTAL_FEATURES% -DENABLE_WEBXR=%WEBKIT_CMAKE_ENABLE_WEBXR%
          if errorlevel 1 exit /b %errorlevel%

          C:\Bootstrap\toolbin\sccache.exe --show-stats

      - name: Baseline package
        shell: bash
        env:
          MSYS2_ARG_CONV_EXCL: "*"
        run: |
          set -euo pipefail
          ROOT="$(cygpath -u 'C:/W/webkit-src/WebKitBuild/Release')"
          BIN="$ROOT/bin"
          PLATFORM=windows
          RUN_ID="${GITHUB_RUN_ID:-local}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          mkdir -p "$OUT_ROOT"
          [[ -d "$BIN" ]] || { echo "::error::Windows bin dir missing: $BIN" >&2; exit 1; }
          MSI="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.msi"
          ZIP="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.zip"
          command -v zip >/dev/null 2>&1 || { echo "::error::zip not found in Git bash PATH"; exit 1; }
          (
            cd "$BIN"
            zip -qr "$ZIP" MiniBrowser.exe WebKit*.dll JavaScriptCore*.dll 2>/dev/null || zip -qr "$ZIP" .
          )
          [[ -s "$ZIP" ]] || { echo "::error::Baseline ZIP empty or missing: $ZIP"; exit 1; }
          printf '%s\n' "WiX/MSI not generated on runner yet; portable ZIP is the baseline payload." >"$MSI"
          export BASELINE_JSON_DIR="$OUT_ROOT"
          export BASELINE_PLATFORM="$PLATFORM"
          export BASELINE_RUN_ID="$RUN_ID"
          export BASELINE_RUN_ATTEMPT="$RUN_ATTEMPT"
          export BASELINE_ZIP="$(basename "$ZIP")"
          export BASELINE_MSI="$(basename "$MSI")"
          export BASELINE_CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python <<'PY'
          import json, os, pathlib
          out = pathlib.Path(os.environ["BASELINE_JSON_DIR"]) / f"baseline-{os.environ['BASELINE_PLATFORM']}-{os.environ['BASELINE_RUN_ID']}.json"
          doc = {
              "platform": os.environ["BASELINE_PLATFORM"],
              "created": os.environ["BASELINE_CREATED"],
              "runId": os.environ["BASELINE_RUN_ID"],
              "attempt": os.environ["BASELINE_RUN_ATTEMPT"],
              "zip": os.environ["BASELINE_ZIP"],
              "msi": os.environ["BASELINE_MSI"],
              "note": "ZIP is the portable baseline; .msi is a placeholder text file until WiX is wired.",
          }
          out.write_text(json.dumps(doc, indent=2))
          PY
          echo "BASELINE_OK platform=$PLATFORM zip=$ZIP"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            C:\W\webkit-src\WebKitBuild\Release\bin
            C:\W\webkit-src\WebKitBuild\Release\CMakeCache.txt
            C:\W\webkit-src\WebKitBuild\Release\vcpkg-manifest-install.log
            ${{ runner.temp }}/baseline-packages
          if-no-files-found: warn

      - name: Cleanup Source
        if: always()
        shell: cmd
        run: |
          if exist "C:\W\webkit-src" rd /s /q "C:\W\webkit-src"
