name: Webkitium Windows Orchestrator

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-windows]

env:
  VCPKG_ROOT: "C:\\vcpkg"
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
  SOURCE_TAG: "webkit-pin"
  BUILD_TYPE: "Release"

permissions:
  contents: write
  packages: write

concurrency:
  group: webkitium-windows-build
  cancel-in-progress: false

jobs:
  build:
    name: Windows WebKit Build
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    steps:
      - uses: actions/checkout@v4

      - name: "Bootstrap: Ensure pwsh"
        shell: cmd
        run: where pwsh >NUL 2>&1 || winget install --id Microsoft.PowerShell --accept-package-agreements --accept-source-agreements --silent

      - name: "Phase 0: Disk Check"
        shell: pwsh
        run: |
          Write-Host "Current Disk Status:"
          Get-PSDrive C | Select-Object Used, Free
          $free = (Get-PSDrive C).Free
          if ($free -lt 30GB) {
            Write-Host "WARNING: Less than 30GB free — cleaning bloatware..."
            $targets = @(
              "C:/Microsoft/AndroidSDK",
              "C:/Program Files/Android",
              "C:/usr/local/lib/android",
              "$env:AGENT_TOOLSDIRECTORY"
            )
            foreach ($path in $targets) {
              if (Test-Path $path) {
                Write-Host "Deleting $path..."
                Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
              }
            }
            Get-PSDrive C | Select-Object Used, Free
          }

      - name: "Phase 1: Fetch and Stitch Source"
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SRC_WIN='C:/W/webkit-src'
          SRC="$(cygpath -u "$SRC_WIN")"
          ARCHIVE="$RUNNER_TEMP/webkit-pin.tar.gz"
          rm -rf "$SRC"
          mkdir -p "$SRC"

          # Download split parts from draft release
          cd "$RUNNER_TEMP"
          gh release download ${{ env.SOURCE_TAG }} \
            --repo ${{ github.repository }} \
            --pattern "webkit-pin.tar.gz.part-*"

          # Stitch parts back into single tarball (sorted glob)
          cat $(ls webkit-pin.tar.gz.part-* | sort) > "$ARCHIVE"
          rm -f webkit-pin.tar.gz.part-*

          # Verify tarball integrity
          echo "Verifying tarball..."
          tar -tzf "$ARCHIVE" > /dev/null
          echo "Tarball OK — $(du -h "$ARCHIVE" | cut -f1)"

          # Extract and clean up
          tar -xzf "$ARCHIVE" --strip-components=1 -C "$SRC"
          rm -f "$ARCHIVE"

          echo "Source ready at $SRC_WIN"
          ls "$SRC" | head -20

      - name: "Phase 2: Apply Patches"
        shell: bash
        run: |
          set -euo pipefail
          SRC="$(cygpath -u 'C:/W/webkit-src')"

          applied=0
          for patch in webkit/patches/common/* webkit/patches/windows/*; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            git -C "$SRC" apply --check --whitespace=nowarn --unidiff-zero "$GITHUB_WORKSPACE/$patch"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$GITHUB_WORKSPACE/$patch"
            applied=$((applied + 1))
          done
          echo "Applied $applied patches."

      - name: "Phase 3: Configure vcpkg Binary Cache"
        shell: pwsh
        run: |
          $url = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          $nuget = $(vcpkg fetch nuget | Select-Object -Last 1)
          & $nuget sources add -Name "GitHub" -Source $url `
            -UserName "${{ github.actor }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          Write-Host "vcpkg NuGet binary cache configured."

      - name: "Phase 4: Build"
        shell: cmd
        run: |
          @echo on
          setlocal
          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b %errorlevel%

          set "SRC=C:\W\webkit-src"
          set "PATH=C:\Bootstrap\toolbin;C:\Program Files\Git\cmd;C:\Ruby34-x64\bin;C:\Python314;C:\Python314\Scripts;C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;C:\Strawberry\perl\bin;%PATH%"
          set "VCPKG_ROOT=C:\vcpkg"
          set "VCPKG_BINARY_SOURCES=clear;nuget,GitHub,readwrite"
          set "SCCACHE_DIR=C:\Bootstrap\sccache-gh\windows-webgpu-dawn"
          if not exist "%SCCACHE_DIR%" mkdir "%SCCACHE_DIR%"
          set "SCCACHE_CACHE_SIZE=50G"
          set "SCCACHE_IDLE_TIMEOUT=0"
          C:\Bootstrap\toolbin\sccache.exe --start-server >NUL 2>&1
          C:\Bootstrap\toolbin\sccache.exe --zero-stats

          cd /d "%SRC%"
          perl Tools\Scripts\build-webkit --release --win --makeargs=-j%NUMBER_OF_PROCESSORS% ^
            -DCMAKE_C_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_CXX_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_LINKER=C:/Progra~1/LLVM/bin/lld-link.exe ^
            -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_SHARED_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_MODULE_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON ^
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded ^
            -DCMAKE_C_FLAGS="-D_CRT_SECURE_NO_WARNINGS -flto=thin" ^
            -DCMAKE_CXX_FLAGS="-D_CRT_SECURE_NO_WARNINGS -flto=thin" ^
            -DCMAKE_C_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-webkit ^
            -DVCPKG_INSTALLED_DIR=C:/vcpkg/installed ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            --webgpu -DENABLE_EXPERIMENTAL_FEATURES=ON -DENABLE_WEBXR=OFF
          if errorlevel 1 exit /b %errorlevel%

          C:\Bootstrap\toolbin\sccache.exe --show-stats

      - name: "Phase 5: Export Binaries"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-win64-${{ env.BUILD_TYPE }}-${{ github.run_id }}
          path: |
            C:\W\webkit-src\WebKitBuild\Release\bin
            C:\W\webkit-src\WebKitBuild\Release\CMakeCache.txt
            C:\W\webkit-src\WebKitBuild\Release\vcpkg-manifest-install.log
          if-no-files-found: warn
