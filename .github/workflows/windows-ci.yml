name: windows-ci

# Per-push CI for the WinUI 3 starter kit at chrome/windows/.
# Distinct from windows-build.yml (the release/baseline-asset workflow).
# Goal: catch breakage in the C# + native combo on every push, so the README
# caveat upgrades from "untested" to "CI-verified on windows-latest."

on:
  push:
    branches: ["**"]
    paths:
      - "chrome/windows/**"
      - "browser/url/**"
      - "browser/suggestions/**"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "chrome/windows/**"
      - "browser/url/**"
      - "browser/suggestions/**"
      - ".github/workflows/windows-ci.yml"
  workflow_dispatch:

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  SOLUTION: chrome/windows/Webkitium.sln
  CONFIGURATION: Debug
  PLATFORM: x64
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        platform: [x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('chrome/windows/**/*.csproj', 'chrome/windows/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # vcpkg in manifest mode resolves chrome/windows/vcpkg.json.
      # x-gha binary cache piggybacks on GitHub Actions cache for the
      # compiled native packages (sqlite3) so subsequent runs skip rebuild.
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "chrome/windows/vcpkg.json"
          runVcpkgInstall: true

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION

      - name: Build solution
        run: |
          msbuild $env:SOLUTION `
            /m `
            /nologo `
            /v:minimal `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=${{ matrix.platform }} `
            /p:RestorePackagesConfig=true `
            /p:VcpkgEnableManifest=true `
            /p:VcpkgEnableInstall=true `
            /bl:msbuild.binlog

      - name: Upload MSBuild binlog (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-binlog-${{ matrix.platform }}
          path: msbuild.binlog
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-windows-${{ matrix.platform }}-${{ env.CONFIGURATION }}
          path: |
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Webkitium.exe
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Webkitium.dll
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/webkitium_core.dll
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.deps.json
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.runtimeconfig.json
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Microsoft.Web.WebView2.*
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Microsoft.WindowsAppRuntime.*
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.winmd
          if-no-files-found: warn
          retention-days: 14

      # Launch Webkitium, drive UIAutomation to navigate to Wikipedia, screenshot.
      # The screenshot is uploaded as an artifact below so the user can download it
      # from the Actions tab — the only way to visually verify the Windows shell
      # without a Windows machine on the user's side.
      - name: Capture Wikipedia screenshot
        if: success()
        run: |
          $ErrorActionPreference = 'Stop'
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing,UIAutomationClient,UIAutomationTypes

          $exe = Get-ChildItem -Recurse -Filter Webkitium.exe -Path chrome/windows | Select-Object -First 1
          if (-not $exe) { throw "Webkitium.exe not found under chrome/windows" }
          Write-Host "Launching $($exe.FullName)"
          $proc = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 8

          $root = [System.Windows.Automation.AutomationElement]::RootElement
          $cond = New-Object System.Windows.Automation.PropertyCondition(
              [System.Windows.Automation.AutomationElement]::ProcessIdProperty, $proc.Id)
          $window = $null
          for ($i = 0; $i -lt 20 -and -not $window; $i++) {
              $window = $root.FindFirst([System.Windows.Automation.TreeScope]::Children, $cond)
              if (-not $window) { Start-Sleep -Milliseconds 500 }
          }
          if (-not $window) { throw "Main window not found via UIAutomation" }

          $nameCond = New-Object System.Windows.Automation.PropertyCondition(
              [System.Windows.Automation.AutomationElement]::NameProperty, "Address bar")
          $urlBar = $window.FindFirst([System.Windows.Automation.TreeScope]::Descendants, $nameCond)
          if ($urlBar) {
              $urlBar.SetFocus()
              Start-Sleep -Milliseconds 300
              [System.Windows.Forms.SendKeys]::SendWait("https://en.wikipedia.org")
              Start-Sleep -Milliseconds 200
              [System.Windows.Forms.SendKeys]::SendWait("{ENTER}")
              Start-Sleep -Seconds 10
          } else {
              Write-Host "WARN: Address bar not found by AutomationProperties.Name — capturing whatever is visible"
              Start-Sleep -Seconds 5
          }

          $rect = $window.Current.BoundingRectangle
          $bmp = New-Object System.Drawing.Bitmap ([int]$rect.Width), ([int]$rect.Height)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen([int]$rect.X, [int]$rect.Y, 0, 0, $bmp.Size)
          $out = Join-Path $env:GITHUB_WORKSPACE "webkitium-windows-wikipedia.png"
          $bmp.Save($out, [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $bmp.Dispose()
          Write-Host "Saved $out"

          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

      - name: Upload Wikipedia screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-windows-wikipedia
          path: webkitium-windows-wikipedia.png
          if-no-files-found: warn
          retention-days: 14
