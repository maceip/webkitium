name: windows-ci

# Per-push CI for the WinUI 3 starter kit at chrome/windows/.
# Distinct from windows-build.yml (the release/baseline-asset workflow).
# Goal: catch breakage in the C# + native combo on every push, so the README
# caveat upgrades from "untested" to "CI-verified on windows-latest."

on:
  push:
    branches: ["**"]
    paths:
      - "chrome/windows/**"
      - "browser/url/**"
      - "browser/suggestions/**"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "chrome/windows/**"
      - "browser/url/**"
      - "browser/suggestions/**"
      - ".github/workflows/windows-ci.yml"
  workflow_dispatch:

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  SOLUTION: chrome/windows/Webkitium.sln
  CONFIGURATION: Debug
  PLATFORM: x64
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        platform: [x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('chrome/windows/**/*.csproj', 'chrome/windows/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # vcpkg in manifest mode resolves chrome/windows/vcpkg.json.
      # x-gha binary cache piggybacks on GitHub Actions cache for the
      # compiled native packages (sqlite3) so subsequent runs skip rebuild.
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "chrome/windows/vcpkg.json"
          runVcpkgInstall: true

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION

      - name: Build solution
        run: |
          msbuild $env:SOLUTION `
            /m `
            /nologo `
            /v:minimal `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=${{ matrix.platform }} `
            /p:RestorePackagesConfig=true `
            /p:VcpkgEnableManifest=true `
            /p:VcpkgEnableInstall=true `
            /bl:msbuild.binlog

      - name: Upload MSBuild binlog (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-binlog-${{ matrix.platform }}
          path: msbuild.binlog
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-windows-${{ matrix.platform }}-${{ env.CONFIGURATION }}
          path: |
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Webkitium.exe
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Webkitium.dll
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/webkitium_core.dll
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.deps.json
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.runtimeconfig.json
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Microsoft.Web.WebView2.*
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Microsoft.WindowsAppRuntime.*
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.winmd
          if-no-files-found: warn
          retention-days: 14

      # The windows-latest runner doesn't ship the WindowsAppRuntime; unpackaged
      # WinUI 3 apps refuse to launch without it. Install the 1.6 redist before
      # the screenshot step.
      - name: Install Windows App Runtime 1.6
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://aka.ms/windowsappsdk/1.6/latest/windowsappruntimeinstall-x64.exe'
          $out = "$env:RUNNER_TEMP\WindowsAppRuntimeInstall.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $out
          Write-Host "Installing..."
          $p = Start-Process -FilePath $out -ArgumentList '--quiet' -PassThru -Wait
          Write-Host "Installer exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "Install failed: $($p.ExitCode)" }

      # Launch Webkitium with WEBKITIUM_LAUNCH_URL so it auto-navigates to
      # Wikipedia on startup (no UI driving required), then capture the window
      # via PrintWindow — works in non-interactive sessions and doesn't depend
      # on UIAutomation seeing the WinUI 3 window.
      - name: Capture Wikipedia screenshot
        if: success()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Add-Type -AssemblyName System.Drawing,System.Windows.Forms

          # Diagnostic capture: enumerate ALL top-level windows owned by the
          # Webkitium process via EnumWindows, log title/class/visibility, then
          # PrintWindow on the best candidate. Falls back to full-desktop capture.
          $cs = 'using System; ' +
                'using System.Collections.Generic; ' +
                'using System.Runtime.InteropServices; ' +
                'using System.Text; ' +
                'public class WinEnum { ' +
                'public delegate bool EnumWindowsProc(IntPtr hWnd, IntPtr lParam); ' +
                '[DllImport("user32.dll")] public static extern bool EnumWindows(EnumWindowsProc lpEnumFunc, IntPtr lParam); ' +
                '[DllImport("user32.dll", CharSet=CharSet.Auto)] public static extern int GetWindowText(IntPtr hWnd, StringBuilder lpString, int nMaxCount); ' +
                '[DllImport("user32.dll", CharSet=CharSet.Auto)] public static extern int GetClassName(IntPtr hWnd, StringBuilder lpClassName, int nMaxCount); ' +
                '[DllImport("user32.dll")] public static extern uint GetWindowThreadProcessId(IntPtr hWnd, out uint lpdwProcessId); ' +
                '[DllImport("user32.dll")] public static extern bool IsWindowVisible(IntPtr hWnd); ' +
                '[DllImport("user32.dll")] public static extern bool IsIconic(IntPtr hWnd); ' +
                '[DllImport("user32.dll")] public static extern bool GetWindowRect(IntPtr hwnd, out RECT rect); ' +
                '[DllImport("user32.dll")] public static extern bool PrintWindow(IntPtr hwnd, IntPtr hdcBlt, int nFlags); ' +
                '[DllImport("user32.dll")] public static extern bool ShowWindow(IntPtr hwnd, int nCmdShow); ' +
                '[StructLayout(LayoutKind.Sequential)] public struct RECT { public int Left, Top, Right, Bottom; } ' +
                'public static List<IntPtr> WindowsFor(uint pid) { ' +
                'var found = new List<IntPtr>(); ' +
                'EnumWindows((h, l) => { uint p; GetWindowThreadProcessId(h, out p); if (p == pid) found.Add(h); return true; }, IntPtr.Zero); ' +
                'return found; ' +
                '} ' +
                'public static string TitleOf(IntPtr h) { var sb = new StringBuilder(256); GetWindowText(h, sb, 256); return sb.ToString(); } ' +
                'public static string ClassOf(IntPtr h) { var sb = new StringBuilder(256); GetClassName(h, sb, 256); return sb.ToString(); } ' +
                '}'
          Add-Type -TypeDefinition $cs -Language CSharp

          $exe = Get-ChildItem -Recurse -Filter Webkitium.exe -Path chrome/windows | Select-Object -First 1
          if (-not $exe) { throw "Webkitium.exe not found under chrome/windows" }
          Write-Host "Launching $($exe.FullName)"
          $env:WEBKITIUM_LAUNCH_URL = 'https://en.wikipedia.org'
          $proc = Start-Process -FilePath $exe.FullName -PassThru
          Write-Host "PID: $($proc.Id)"

          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 1
            $proc.Refresh()
            $hasExited = $proc.HasExited
            $mwh = $proc.MainWindowHandle
            $owned = [WinEnum]::WindowsFor([uint32]$proc.Id)
            $vis = $owned | Where-Object { [WinEnum]::IsWindowVisible($_) }
            Write-Host "[$i s] HasExited=$hasExited MainWindowHandle=$mwh OwnedWindows=$($owned.Count) Visible=$($vis.Count)"
            if ($hasExited) {
              Write-Host "Process exited with code $($proc.ExitCode)"
              break
            }
            if ($vis.Count -gt 0 -and $i -ge 12) { break }
          }

          $proc.Refresh()
          $owned = [WinEnum]::WindowsFor([uint32]$proc.Id)
          Write-Host "Final: owned windows = $($owned.Count)"
          foreach ($h in $owned) {
            $t = [WinEnum]::TitleOf($h)
            $c = [WinEnum]::ClassOf($h)
            $v = [WinEnum]::IsWindowVisible($h)
            $r = New-Object WinEnum+RECT
            [void][WinEnum]::GetWindowRect($h, [ref]$r)
            Write-Host "  HWND=$h title='$t' class='$c' visible=$v rect=($($r.Left),$($r.Top))-($($r.Right),$($r.Bottom))"
          }

          $target = $owned | Where-Object { [WinEnum]::IsWindowVisible($_) -and -not [WinEnum]::IsIconic($_) -and ([WinEnum]::TitleOf($_)).Length -gt 0 } | Select-Object -First 1
          if (-not $target) { $target = $owned | Where-Object { [WinEnum]::IsWindowVisible($_) } | Select-Object -First 1 }
          if (-not $target -and $owned.Count -gt 0) {
            $target = $owned | Select-Object -First 1
            [void][WinEnum]::ShowWindow($target, 5)
            Start-Sleep -Seconds 2
          }

          $out = Join-Path $env:GITHUB_WORKSPACE 'webkitium-windows-wikipedia.png'

          if ($target) {
            Write-Host "Capturing window $target"
            $r = New-Object WinEnum+RECT
            [void][WinEnum]::GetWindowRect($target, [ref]$r)
            $w = [Math]::Max(1, $r.Right - $r.Left)
            $h = [Math]::Max(1, $r.Bottom - $r.Top)
            $bmp = New-Object System.Drawing.Bitmap $w, $h
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $hdc = $g.GetHdc()
            [void][WinEnum]::PrintWindow($target, $hdc, 2)
            $g.ReleaseHdc($hdc)
            $g.Dispose()
            $bmp.Save($out, [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Dispose()
            Write-Host "Saved window capture to $out"
          } else {
            Write-Host "WARN: No Webkitium window found at all — capturing primary screen"
            $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bmp = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
            $bmp.Save($out, [System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose(); $bmp.Dispose()
          }

          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

      - name: Upload Wikipedia screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-windows-wikipedia
          path: webkitium-windows-wikipedia.png
          if-no-files-found: warn
          retention-days: 14
