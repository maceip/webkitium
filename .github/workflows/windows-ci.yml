name: windows-ci

# Per-push CI for the WinUI 3 starter kit at chrome/windows/.
# Distinct from windows-build.yml (the release/baseline-asset workflow).
# Goal: catch breakage in the C# + native combo on every push, so the README
# caveat upgrades from "untested" to "CI-verified on windows-latest."

on:
  push:
    branches: ["**"]
    paths:
      - "chrome/windows/**"
      - "browser/url/**"
      - "browser/suggestions/**"
      - ".github/workflows/windows-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "chrome/windows/**"
      - "browser/url/**"
      - "browser/suggestions/**"
      - ".github/workflows/windows-ci.yml"
  workflow_dispatch:

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  SOLUTION: chrome/windows/Webkitium.sln
  CONFIGURATION: Debug
  PLATFORM: x64
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        platform: [x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('chrome/windows/**/*.csproj', 'chrome/windows/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # vcpkg in manifest mode resolves chrome/windows/vcpkg.json.
      # x-gha binary cache piggybacks on GitHub Actions cache for the
      # compiled native packages (sqlite3) so subsequent runs skip rebuild.
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "chrome/windows/vcpkg.json"
          runVcpkgInstall: true

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION

      - name: Build solution
        run: |
          msbuild $env:SOLUTION `
            /m `
            /nologo `
            /v:minimal `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=${{ matrix.platform }} `
            /p:RestorePackagesConfig=true `
            /p:VcpkgEnableManifest=true `
            /p:VcpkgEnableInstall=true `
            /bl:msbuild.binlog

      - name: Upload MSBuild binlog (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-binlog-${{ matrix.platform }}
          path: msbuild.binlog
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-windows-${{ matrix.platform }}-${{ env.CONFIGURATION }}
          path: |
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Webkitium.exe
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Webkitium.dll
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/webkitium_core.dll
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.deps.json
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.runtimeconfig.json
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Microsoft.Web.WebView2.*
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/Microsoft.WindowsAppRuntime.*
            chrome/windows/Webkitium/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.winmd
          if-no-files-found: warn
          retention-days: 14

      # The windows-latest runner doesn't ship the WindowsAppRuntime; unpackaged
      # WinUI 3 apps refuse to launch without it. Install the 1.6 redist before
      # the screenshot step.
      - name: Install Windows App Runtime 1.6
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://aka.ms/windowsappsdk/1.6/latest/windowsappruntimeinstall-x64.exe'
          $out = "$env:RUNNER_TEMP\WindowsAppRuntimeInstall.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $out
          Write-Host "Installing..."
          $p = Start-Process -FilePath $out -ArgumentList '--quiet' -PassThru -Wait
          Write-Host "Installer exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "Install failed: $($p.ExitCode)" }

      # Launch Webkitium with WEBKITIUM_LAUNCH_URL so it auto-navigates to
      # Wikipedia on startup (no UI driving required), then capture the window
      # via PrintWindow — works in non-interactive sessions and doesn't depend
      # on UIAutomation seeing the WinUI 3 window.
      - name: Capture Wikipedia screenshot
        if: success()
        run: |
          $ErrorActionPreference = 'Stop'
          Add-Type -AssemblyName System.Drawing,System.Windows.Forms

          # PowerShell here-strings require the closing marker at column 0, which
          # is incompatible with YAML block-scalar indentation. Use a regular
          # multi-line string instead — built via string concatenation.
          $cs = 'using System; using System.Runtime.InteropServices; ' +
                'public class WinCap { ' +
                '[DllImport("user32.dll")] public static extern bool PrintWindow(IntPtr hwnd, IntPtr hdcBlt, int nFlags); ' +
                '[DllImport("user32.dll")] public static extern bool GetWindowRect(IntPtr hwnd, out RECT rect); ' +
                '[StructLayout(LayoutKind.Sequential)] public struct RECT { public int Left, Top, Right, Bottom; } ' +
                '}'
          Add-Type -TypeDefinition $cs -Language CSharp

          $exe = Get-ChildItem -Recurse -Filter Webkitium.exe -Path chrome/windows | Select-Object -First 1
          if (-not $exe) { throw "Webkitium.exe not found under chrome/windows" }
          Write-Host "Launching $($exe.FullName)"
          $env:WEBKITIUM_LAUNCH_URL = 'https://en.wikipedia.org'
          $proc = Start-Process -FilePath $exe.FullName -PassThru

          $timeoutSec = 40
          $elapsed = 0.0
          while ($proc.MainWindowHandle -eq [IntPtr]::Zero -and $elapsed -lt $timeoutSec) {
            Start-Sleep -Milliseconds 500
            $elapsed += 0.5
            $proc.Refresh()
          }
          if ($proc.MainWindowHandle -eq [IntPtr]::Zero) {
            Write-Host "WARN: MainWindowHandle still zero after $timeoutSec s — capturing screen anyway"
          } else {
            Write-Host "MainWindowHandle: $($proc.MainWindowHandle)"
            Start-Sleep -Seconds 12
          }

          if ($proc.MainWindowHandle -ne [IntPtr]::Zero) {
            $rect = New-Object WinCap+RECT
            [void][WinCap]::GetWindowRect($proc.MainWindowHandle, [ref]$rect)
            $w = $rect.Right - $rect.Left
            $h = $rect.Bottom - $rect.Top
            Write-Host "Window size: $w x $h"
            $bmp = New-Object System.Drawing.Bitmap $w, $h
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $hdc = $g.GetHdc()
            [void][WinCap]::PrintWindow($proc.MainWindowHandle, $hdc, 2)
            $g.ReleaseHdc($hdc)
            $g.Dispose()
          } else {
            $screen = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bmp = New-Object System.Drawing.Bitmap $screen.Width, $screen.Height
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
            $g.Dispose()
          }

          $out = Join-Path $env:GITHUB_WORKSPACE 'webkitium-windows-wikipedia.png'
          $bmp.Save($out, [System.Drawing.Imaging.ImageFormat]::Png)
          $bmp.Dispose()
          Write-Host "Saved $out"

          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

      - name: Upload Wikipedia screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-windows-wikipedia
          path: webkitium-windows-wikipedia.png
          if-no-files-found: warn
          retention-days: 14
