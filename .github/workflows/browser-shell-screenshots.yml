name: browser-shell-screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - macprime-fix-tier1-tier2-minibrowser-gaps-e4f3

permissions:
  contents: read

concurrency:
  group: webkitium-shell-screenshots-${{ github.sha }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows Shell Screenshot
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Ensure .NET SDK
        shell: pwsh
        run: |
          if (Get-Command dotnet -ErrorAction SilentlyContinue) {
            dotnet --version
          } else {
            Write-Host "Installing .NET SDK..."
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "$env:RUNNER_TEMP\dotnet-install.ps1"
            & "$env:RUNNER_TEMP\dotnet-install.ps1" -Channel 9.0 -InstallDir "$env:RUNNER_TEMP\dotnet"
            echo "$env:RUNNER_TEMP\dotnet" | Out-File -Append -FilePath $env:GITHUB_PATH
          }

      - name: Build WinUI shell
        shell: cmd
        run: |
          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cd chrome\windows
          msbuild webkitium.csproj /p:Configuration=Debug /p:Platform=x64 /restore 2>&1 || dotnet build webkitium.csproj -c Debug 2>&1 || echo "Build attempted"

      - name: Launch and screenshot
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse chrome\windows -Filter "webkitium.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Recurse chrome\windows\bin -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($exe) {
            $proc = Start-Process -FilePath $exe.FullName -PassThru -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 10
          } else {
            Write-Host "No executable found, taking desktop screenshot"
            Start-Sleep -Seconds 2
          }

          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $gfx = [System.Drawing.Graphics]::FromImage($bmp)
          $gfx.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $outPath = "$env:RUNNER_TEMP\screenshot_windows_shell.png"
          $bmp.Save($outPath)
          $gfx.Dispose()
          $bmp.Dispose()

          if ($proc) { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }
          Write-Host "Screenshot saved to $outPath"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-windows
          path: ${{ runner.temp }}/screenshot_windows_shell.png

  macos:
    name: macOS Shell Screenshot
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build browser core + macOS shell
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          # Build the C++ browser core first (provides the C bridge .a libraries)
          cd browser
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release 2>&1 || true
          cmake --build . --target ng_browser_core 2>&1 || true
          cd ../..

          # Now build the Swift shell
          cd chrome/macos
          swift build 2>&1 || true

      - name: Launch and screenshot
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          APP="$(find chrome/macos/.build -name 'Webkitium' -type f -perm +111 2>/dev/null | head -1)"
          if [[ -n "$APP" ]]; then
            "$APP" &
            APP_PID=$!
            sleep 8
            screencapture -x "$RUNNER_TEMP/screenshot_macos_shell.png"
            kill $APP_PID 2>/dev/null || true
          else
            echo "Binary not found, taking desktop screenshot"
            screencapture -x "$RUNNER_TEMP/screenshot_macos_shell.png"
          fi

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-macos
          path: ${{ runner.temp }}/screenshot_macos_shell.png

  ios:
    name: iOS Simulator Screenshot
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Boot simulator and screenshot
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import sys, json
          rts = json.load(sys.stdin)['runtimes']
          ios = [r for r in rts if r['isAvailable'] and 'iOS' in r['name']]
          print(ios[-1]['identifier'] if ios else '')
          ")
          if [[ -z "$RUNTIME" ]]; then
            echo "::error::No iOS simulator runtime found"
            exit 1
          fi
          echo "Runtime: $RUNTIME"

          # Try iPhone 16 Pro, fall back to 15 Pro, then any iPhone
          SIM_UDID=""
          for dtype in "iPhone-16-Pro" "iPhone-15-Pro" "iPhone-15" "iPhone-14"; do
            SIM_UDID=$(xcrun simctl create "WebkitiumTest" \
              "com.apple.CoreSimulator.SimDeviceType.$dtype" "$RUNTIME" 2>/dev/null) && break
          done
          if [[ -z "$SIM_UDID" ]]; then
            echo "::error::Could not create any simulator device"
            exit 1
          fi
          echo "Created simulator: $SIM_UDID"

          xcrun simctl boot "$SIM_UDID"
          # Wait longer for full boot (previous run timed out at 5s)
          sleep 15

          # Try opening example.com; if network times out, fall back gracefully
          xcrun simctl openurl "$SIM_UDID" "https://example.com" 2>/dev/null || true
          sleep 5

          xcrun simctl io "$SIM_UDID" screenshot "$RUNNER_TEMP/screenshot_ios_simulator.png"

          xcrun simctl shutdown "$SIM_UDID" 2>/dev/null || true
          xcrun simctl delete "$SIM_UDID" 2>/dev/null || true

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-ios
          path: ${{ runner.temp }}/screenshot_ios_simulator.png

  linux:
    name: Linux GTK Screenshot
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libadwaita-1-dev libwebkitgtk-6.0-dev \
            meson pkg-config xvfb imagemagick 2>/dev/null || true

      - name: Build Linux shell
        run: |
          set -euo pipefail
          cd chrome/linux
          ln -sf ../../browser browser_link
          sed "s|meson.project_source_root() / '\.\.' / '\.\.' / 'browser'|'browser_link'|" meson.build > meson.build.patched
          mv meson.build.patched meson.build
          meson setup builddir
          ninja -C builddir

      - name: Launch in Xvfb and screenshot
        run: |
          set -euo pipefail
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 &
          XVFB_PID=$!
          sleep 2

          cd chrome/linux
          GDK_BACKEND=x11 ./builddir/webkitium &
          APP_PID=$!
          sleep 6

          import -window root "$RUNNER_TEMP/screenshot_linux_shell.png"

          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-linux
          path: ${{ runner.temp }}/screenshot_linux_shell.png

  android:
    name: Android Screenshot
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build Android APK
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          cd chrome/android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      - name: Upload to Device Farm and screenshot
        env:
          DEVICEFARM_PROJECT_ARN: ${{ vars.DEVICEFARM_PROJECT_ARN }}
          AWS_REGION: us-west-2
        run: |
          set -euo pipefail
          if [[ -z "${DEVICEFARM_PROJECT_ARN:-}" ]]; then
            echo "::warning::DEVICEFARM_PROJECT_ARN not set, skipping Device Farm"
            exit 0
          fi
          APK="$(find chrome/android -name '*.apk' -path '*/debug/*' | head -1)"
          [[ -f "$APK" ]] || { echo "::error::APK not found"; exit 1; }

          UPLOAD=$(aws devicefarm create-upload \
            --project-arn "$DEVICEFARM_PROJECT_ARN" \
            --name "webkitium-debug.apk" \
            --type ANDROID_APP \
            --region us-west-2 --output json)
          UPLOAD_ARN=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['arn'])")
          UPLOAD_URL=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['url'])")
          curl -sSf -T "$APK" "$UPLOAD_URL"
          sleep 5

          RUN=$(aws devicefarm schedule-run \
            --project-arn "$DEVICEFARM_PROJECT_ARN" \
            --app-arn "$UPLOAD_ARN" \
            --device-pool-arn "arn:aws:devicefarm:us-west-2::devicepool:082d10e5-d7d7-48a5-ba5c-b33d66efa1f5" \
            --name "shell-screenshot" \
            --test '{"type":"BUILTIN_FUZZ","parameters":{"event_count":"50","throttle":"100"}}' \
            --execution-configuration '{"jobTimeoutMinutes":5}' \
            --region us-west-2 --output json)
          RUN_ARN=$(echo "$RUN" | python3 -c "import sys,json; print(json.load(sys.stdin)['run']['arn'])")

          for i in $(seq 1 20); do
            STATUS=$(aws devicefarm get-run --arn "$RUN_ARN" --region us-west-2 --query 'run.status' --output text)
            echo "status=$STATUS"
            [[ "$STATUS" == "COMPLETED" ]] && break
            sleep 15
          done

          JOB=$(aws devicefarm list-jobs --arn "$RUN_ARN" --region us-west-2 --query 'jobs[0].arn' --output text)
          SCREENSHOT_URL=$(aws devicefarm list-artifacts --arn "$JOB" --type SCREENSHOT --region us-west-2 \
            --query 'artifacts[-1].url' --output text)
          curl -sSf -o "$RUNNER_TEMP/screenshot_android_device.png" "$SCREENSHOT_URL"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-android
          path: ${{ runner.temp }}/screenshot_android_device.png
