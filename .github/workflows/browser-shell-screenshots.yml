name: browser-shell-screenshots

# GUI proof: chrome UI + pinned WebKit loads https://en.wikipedia.org; lock + content asserts.
# See docs/CHROME_PLATFORM_REVIEW.md.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webkitium-shell-screenshots
  cancel-in-progress: true

jobs:
  windows:
    name: Windows Shell Screenshot (WKView)
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Prepend Python to PATH
        shell: bash
        run: |
          echo "C:\Python314" >> "$GITHUB_PATH"
          echo "C:\Python314\Scripts" >> "$GITHUB_PATH"

      - name: Load CI matrix into environment
        shell: bash
        run: |
          set -euo pipefail
          python "$GITHUB_WORKSPACE/config/ci_matrix_env.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" >> "$GITHUB_ENV"

      - name: Prepare WebKit source + patches
        shell: bash
        run: |
          set -euo pipefail
          SRC_WIN='C:/W/webkit-src'
          SRC="$(cygpath -u "$SRC_WIN")"
          bash "$GITHUB_WORKSPACE/scripts/ci_prepare_webkit_source.sh" "$SRC"
          python "$GITHUB_WORKSPACE/config/apply_webkit_patches.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
            --changes "$GITHUB_WORKSPACE/config/changes.json" \
            --webkit-root "$SRC" \
            --platform windows \
            --mode apply

      - name: Build WebKit (sccache-warmed)
        shell: cmd
        run: |
          @echo on
          setlocal
          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b %errorlevel%
          set "SRC=C:\W\webkit-src"
          set "PATH=%PATH:C:\Strawberry\c\bin;=%"
          set "CC=C:\Program Files\LLVM\bin\clang-cl.exe"
          set "CXX=C:\Program Files\LLVM\bin\clang-cl.exe"
          set "PATH=C:\Bootstrap\toolbin;C:\Program Files\Git\cmd;C:\Ruby34-x64\bin;C:\Python314;C:\Python314\Scripts;C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja;C:\Strawberry\perl\bin;%PATH%"
          set "VCPKG_ROOT=C:\vcpkg"
          set "SCCACHE_DIR=C:\Bootstrap\sccache-gh\windows-webgpu-dawn"
          set "SCCACHE_CACHE_SIZE=50G"
          set "SCCACHE_IDLE_TIMEOUT=0"
          C:\Bootstrap\toolbin\sccache.exe --start-server >NUL 2>&1
          cd /d "%SRC%"
          perl Tools\Scripts\build-webkit --debug --win --makeargs=-j%NUMBER_OF_PROCESSORS% ^
            -DCMAKE_C_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_CXX_COMPILER=C:/Progra~1/LLVM/bin/clang-cl.exe ^
            -DCMAKE_LINKER=C:/Progra~1/LLVM/bin/lld-link.exe ^
            -DCMAKE_EXE_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_SHARED_LINKER_FLAGS=-fuse-ld=lld ^
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded ^
            -DCMAKE_C_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=C:/Bootstrap/toolbin/sccache.exe ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-webkit ^
            -DVCPKG_INSTALLED_DIR=C:/vcpkg/installed ^
            -DVCPKG_MANIFEST_MODE=OFF ^
            -DENABLE_EXPERIMENTAL_FEATURES=%WEBKIT_CMAKE_ENABLE_EXPERIMENTAL_FEATURES% ^
            -DENABLE_WEBXR=%WEBKIT_CMAKE_ENABLE_WEBXR% ^
            %WINDOWS_BUILD_WEBKIT_EXTRA%
          if errorlevel 1 exit /b %errorlevel%

      - name: Build WinUI shell + WebKitHost (WKView)
        shell: cmd
        run: |
          @echo on
          setlocal
          call "C:\BuildTools\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          if errorlevel 1 exit /b %errorlevel%
          set "PATH=C:\Program Files\dotnet;C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\BuildTools\MSBuild\Current\Bin;%PATH%"
          where dotnet >NUL 2>&1 || (echo ::error::dotnet not found on PATH & exit /b 9009)
          cd /d "%GITHUB_WORKSPACE%\chrome\windows"
          dotnet build Webkitium.sln -c Debug -p:Platform=x64 ^
            /p:WebKitSrc=C:\W\webkit-src ^
            /p:WebKitBuild=C:\W\webkit-src\WebKitBuild\Debug
          if errorlevel 1 exit /b %errorlevel%

      - name: Launch Webkitium and capture Wikipedia
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse "$env:GITHUB_WORKSPACE\chrome\windows\Webkitium\bin" -Filter "Webkitium.exe" | Select-Object -First 1
          if (-not $exe) { throw "Webkitium.exe not found under chrome/windows/Webkitium/bin" }
          $env:WEBKITIUM_LAUNCH_URL = 'https://en.wikipedia.org'
          Write-Host "Launching: $($exe.FullName)"
          $proc = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 22
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $gfx = [System.Drawing.Graphics]::FromImage($bmp)
          $gfx.CopyFromScreen($bounds.Location, [System.Drawing.Point]::Empty, $bounds.Size)
          $out = Join-Path $env:RUNNER_TEMP 'webkitium-windows-wikipedia.png'
          $bmp.Save($out)
          $gfx.Dispose()
          $bmp.Dispose()
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path $out)) { throw "Screenshot not written" }
          Get-Item $out | Select-Object FullName, Length

      - name: Assert HTTPS lock and engine content
        shell: bash
        run: |
          set -euo pipefail
          pip install -q Pillow
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_https_chrome_lock.py" \
            "$RUNNER_TEMP/webkitium-windows-wikipedia.png"
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_engine_content.py" \
            "$RUNNER_TEMP/webkitium-windows-wikipedia.png"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-windows
          path: ${{ runner.temp }}/webkitium-windows-wikipedia.png
          if-no-files-found: warn

  macos:
    name: macOS Shell Screenshot (in-process pinned WebKit)
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS shell (pinned WebKit.framework)
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          SRC="${NG_MACOS_WEBKIT_SRC:-$HOME/webkit-src}"
          ENGINE="$SRC/WebKitBuild/Debug"
          [[ -d "$ENGINE/WebKit.framework" ]] || { echo "::error::WebKit.framework missing at $ENGINE"; exit 1; }
          export WEBKIT_FRAMEWORK_PATH="$ENGINE"
          export DYLD_FRAMEWORK_PATH="$ENGINE${DYLD_FRAMEWORK_PATH:+:$DYLD_FRAMEWORK_PATH}"
          cd chrome/macos
          swift build -c debug \
            -Xlinker -F -Xlinker "$ENGINE" \
            -Xlinker -rpath -Xlinker "$ENGINE" 2>&1 | tail -20

      - name: Launch and screenshot
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          SRC="${NG_MACOS_WEBKIT_SRC:-$HOME/webkit-src}"
          ENGINE="$SRC/WebKitBuild/Debug"
          export WEBKIT_FRAMEWORK_PATH="$ENGINE"
          export DYLD_FRAMEWORK_PATH="$ENGINE${DYLD_FRAMEWORK_PATH:+:$DYLD_FRAMEWORK_PATH}"
          BIN="$(find chrome/macos/.build -name 'Webkitium' -type f -perm +111 2>/dev/null | head -1)"
          [[ -x "$BIN" ]] || { echo "::error::macOS Webkitium binary not found"; exit 1; }
          export WEBKITIUM_LAUNCH_URL='https://en.wikipedia.org'
          "$BIN" &
          sleep 18
          screencapture -x "$RUNNER_TEMP/screenshot_macos_shell.png"
          pkill -f "Webkitium" 2>/dev/null || true
          echo "Screenshot saved"

      - name: Assert HTTPS lock and engine content
        run: |
          set -euo pipefail
          pip3 install -q Pillow
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_https_chrome_lock.py" \
            "$RUNNER_TEMP/screenshot_macos_shell.png"
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_engine_content.py" \
            "$RUNNER_TEMP/screenshot_macos_shell.png"

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-macos
          path: ${{ runner.temp }}/screenshot_macos_shell.png

  ios:
    name: iOS Simulator Screenshot (pinned WebKit in-app)
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS app + boot simulator + screenshot
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          # Find an available iPhone (NOT iPad) simulator runtime
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import sys, json
          rts = json.load(sys.stdin)['runtimes']
          ios = [r for r in rts if r['isAvailable'] and 'iOS' in r['name']]
          print(ios[-1]['identifier'] if ios else '')
          ")
          [[ -n "$RUNTIME" ]] || { echo "::error::No iOS simulator runtime found"; exit 1; }
          echo "Runtime: $RUNTIME"

          # Prefer iPhone 17 Pro, fall back to whatever iPhone is available
          DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro"
          SIM_UDID=$(xcrun simctl create "WebkitiumTest" "$DEVICE_TYPE" "$RUNTIME" 2>/dev/null || \
                     xcrun simctl create "WebkitiumTest" "com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro" "$RUNTIME" 2>/dev/null || \
                     xcrun simctl create "WebkitiumTest" "com.apple.CoreSimulator.SimDeviceType.iPhone-16" "$RUNTIME")
          echo "Simulator: $SIM_UDID"

          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b
          sleep 3

          # Build Webkitium for the booted simulator
          SRC="${NG_IOS_WEBKIT_PATH:-$HOME/W/webkit-ios-src}"
          ENGINE="$SRC/WebKitBuild/Debug"
          [[ -d "$ENGINE" ]] || { echo "::error::iOS WebKit build required at $ENGINE"; exit 1; }

          cd chrome/ios
          xcodebuild -project Webkitium.xcodeproj -scheme Webkitium \
            -destination "id=$SIM_UDID" \
            -derivedDataPath build build 2>&1 | tail -10
          APP=$(find build -name 'Webkitium.app' -type d | head -1)
          [[ -n "$APP" ]] || { echo "::error::Webkitium.app not built"; exit 1; }
          chmod +x "$GITHUB_WORKSPACE/scripts/ios_embed_webkit_frameworks.sh"
          bash "$GITHUB_WORKSPACE/scripts/ios_embed_webkit_frameworks.sh" "$APP" "$ENGINE"

          # Install + launch with WEBKITIUM_LAUNCH_URL env so the app loads Wikipedia
          xcrun simctl install "$SIM_UDID" "$APP"
          xcrun simctl launch --console-pty "$SIM_UDID" org.webkitium.ios \
            WEBKITIUM_LAUNCH_URL=https://en.wikipedia.org &
          LAUNCH_PID=$!
          sleep 18

          xcrun simctl io "$SIM_UDID" screenshot "$RUNNER_TEMP/screenshot_ios_simulator.png"

          kill $LAUNCH_PID 2>/dev/null || true
          xcrun simctl shutdown "$SIM_UDID" || true
          xcrun simctl delete "$SIM_UDID" || true
          echo "iOS screenshot saved"

      - name: Assert HTTPS lock and engine content
        run: |
          set -euo pipefail
          pip3 install -q Pillow
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_https_chrome_lock.py" \
            "$RUNNER_TEMP/screenshot_ios_simulator.png"
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_engine_content.py" \
            "$RUNNER_TEMP/screenshot_ios_simulator.png" --top-skip 0.14

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-ios
          path: ${{ runner.temp }}/screenshot_ios_simulator.png

  linux:
    name: Linux GTK Screenshot (pinned WebKitGTK in-shell)
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libgtk-4-dev libclang-dev \
            libprotobuf-dev libsqlite3-dev protobuf-compiler \
            xvfb x11-utils xdotool imagemagick scrot \
            dbus-x11 at-spi2-core

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Linux shell
        run: |
          set -euo pipefail
          SRC="${NG_LINUX_GTK_WEBKIT_SRC:-$HOME/webkit-src-gtk}"
          export WEBKIT_GTK_BUILD="$SRC/WebKitBuild/GTK/Debug"
          [[ -d "$WEBKIT_GTK_BUILD/lib/pkgconfig" ]] || {
            echo "::error::Pinned WebKit GTK build required at $WEBKIT_GTK_BUILD"
            exit 1
          }
          cd chrome/linux
          cargo build --release

      - name: Launch in Xvfb and screenshot
        run: |
          set -euo pipefail
          BIN=$(find chrome/linux/target/release -maxdepth 1 -type f -executable | grep -v "\.d$" | head -1)
          [[ -x "$BIN" ]] || { echo "::error::Linux binary not found"; exit 1; }

          Xvfb :99 -screen 0 1280x800x24 -ac +render -noreset >/tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          sleep 2
          export DISPLAY=:99
          export GTK_A11Y=none
          export NO_AT_BRIDGE=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1
          export LIBGL_ALWAYS_SOFTWARE=1
          export GDK_BACKEND=x11
          export GSK_RENDERER=cairo
          export WEBKITIUM_LAUNCH_URL='https://en.wikipedia.org'

          dbus-run-session -- bash -c "
            '$BIN' >/tmp/app.log 2>&1 &
            APP=\$!
            sleep 15
            import -window root '$RUNNER_TEMP/screenshot_linux_shell.png' || scrot '$RUNNER_TEMP/screenshot_linux_shell.png'
            kill \$APP 2>/dev/null || true
          "
          kill $XVFB_PID 2>/dev/null || true
          echo "Linux screenshot saved"

      - name: Assert HTTPS lock and engine content
        run: |
          set -euo pipefail
          pip3 install -q Pillow
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_https_chrome_lock.py" \
            "$RUNNER_TEMP/screenshot_linux_shell.png"
          python3 "$GITHUB_WORKSPACE/scripts/ci_assert_engine_content.py" \
            "$RUNNER_TEMP/screenshot_linux_shell.png"

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-linux
          path: ${{ runner.temp }}/screenshot_linux_shell.png

  android:
    name: Android Screenshot (WPE engine + chrome APK)
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build wpeview AAR (pinned wpe-android)
        run: |
          set -euo pipefail
          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          [[ -d "$SRC/.git" ]] || { echo "::error::wpe-android checkout required at $SRC"; exit 1; }
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          cd "$SRC"
          chmod +x gradlew
          ./gradlew :wpeview:assembleDebug --no-daemon

      - id: wpe_aar
        name: Locate wpeview AAR
        run: |
          set -euo pipefail
          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          AAR="$(find "$SRC" -type f -name 'wpeview*-debug.aar' 2>/dev/null | head -1)"
          [[ -n "$AAR" ]] || { echo "::error::wpeview debug AAR not found under $SRC"; exit 1; }
          echo "path=$AAR" >> "$GITHUB_OUTPUT"

      - name: Build Android chrome APK
        env:
          WPEVIEW_AAR: ${{ steps.wpe_aar.outputs.path }}
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          cd chrome/android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload to Device Farm and screenshot
        env:
          DEVICEFARM_PROJECT_ARN: ${{ secrets.DEVICEFARM_PROJECT_ARN }}
          AWS_REGION: us-west-2
        run: |
          set -euo pipefail
          APK="$(find chrome/android -name '*.apk' -path '*/debug/*' | head -1)"
          [[ -f "$APK" ]] || { echo "::error::APK not found"; exit 1; }

          # Upload APK
          UPLOAD=$(aws devicefarm create-upload \
            --project-arn "$DEVICEFARM_PROJECT_ARN" \
            --name "webkitium-debug.apk" \
            --type ANDROID_APP \
            --region us-west-2 --output json)
          UPLOAD_ARN=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['arn'])")
          UPLOAD_URL=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['url'])")
          curl -sSf -T "$APK" "$UPLOAD_URL"
          sleep 5

          # Run fuzz test (captures screenshots automatically)
          RUN=$(aws devicefarm schedule-run \
            --project-arn "$DEVICEFARM_PROJECT_ARN" \
            --app-arn "$UPLOAD_ARN" \
            --device-pool-arn "arn:aws:devicefarm:us-west-2::devicepool:082d10e5-d7d7-48a5-ba5c-b33d66efa1f5" \
            --name "shell-screenshot" \
            --test '{"type":"BUILTIN_FUZZ","parameters":{"event_count":"50","throttle":"100"}}' \
            --execution-configuration '{"jobTimeoutMinutes":5}' \
            --region us-west-2 --output json)
          RUN_ARN=$(echo "$RUN" | python3 -c "import sys,json; print(json.load(sys.stdin)['run']['arn'])")

          # Poll
          for i in $(seq 1 20); do
            STATUS=$(aws devicefarm get-run --arn "$RUN_ARN" --region us-west-2 --query 'run.status' --output text)
            echo "status=$STATUS"
            [[ "$STATUS" == "COMPLETED" ]] && break
            sleep 15
          done

          # Download first screenshot
          JOB=$(aws devicefarm list-jobs --arn "$RUN_ARN" --region us-west-2 --query 'jobs[0].arn' --output text)
          SCREENSHOT_URL=$(aws devicefarm list-artifacts --arn "$JOB" --type SCREENSHOT --region us-west-2 \
            --query 'artifacts[-1].url' --output text)
          curl -sSf -o "$RUNNER_TEMP/screenshot_android_device.png" "$SCREENSHOT_URL"
          echo "Android screenshot saved"

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-android
          path: ${{ runner.temp }}/screenshot_android_device.png
