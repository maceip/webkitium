name: browser-shell-screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - macprime-fix-tier1-tier2-minibrowser-gaps-e4f3

permissions:
  contents: read

concurrency:
  group: webkitium-shell-screenshots-${{ github.sha }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows Shell Screenshot
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        shell: pwsh
        run: |
          # .NET SDK
          if (-not (Get-Command dotnet -ErrorAction SilentlyContinue)) {
            Write-Host "Installing .NET 8.0 SDK..."
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "$env:RUNNER_TEMP\dotnet-install.ps1"
            & "$env:RUNNER_TEMP\dotnet-install.ps1" -Channel 8.0 -InstallDir "C:\dotnet"
            echo "C:\dotnet" | Out-File -Append -FilePath $env:GITHUB_PATH
          }
          # WebView2 Runtime
          $wv2 = Get-ItemProperty "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}" -ErrorAction SilentlyContinue
          if (-not $wv2) {
            Write-Host "Installing WebView2 Runtime..."
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:RUNNER_TEMP\MicrosoftEdgeWebview2Setup.exe"
            Start-Process -FilePath "$env:RUNNER_TEMP\MicrosoftEdgeWebview2Setup.exe" -ArgumentList "/silent /install" -Wait -ErrorAction SilentlyContinue
          } else {
            Write-Host "WebView2 already installed: $($wv2.pv)"
          }
          # WindowsAppSDK Runtime (required for WinUI 3 XAML to render)
          Write-Host "Installing WindowsAppSDK Runtime 1.6..."
          $wasdk = "$env:RUNNER_TEMP\windowsappruntimeinstall-x64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/windowsappsdk/1.6/latest/windowsappruntimeinstall-x64.exe" -OutFile $wasdk -ErrorAction SilentlyContinue
          if (Test-Path $wasdk) {
            Start-Process -FilePath $wasdk -ArgumentList "--quiet" -Wait -ErrorAction SilentlyContinue
            Write-Host "WindowsAppSDK Runtime installed"
          } else {
            Write-Host "::warning::Could not download WindowsAppSDK Runtime"
          }

      - name: Build WinUI shell
        shell: pwsh
        run: |
          if (Test-Path "C:\dotnet\dotnet.exe") { $env:PATH = "C:\dotnet;$env:PATH" }
          $csproj = "chrome\windows\webkitium.csproj"
          $xml = [xml](Get-Content $csproj)
          # Remove BuildNativeSidecar target (needs VS C++ workload)
          $targets = $xml.SelectNodes("//Target[@Name='BuildNativeSidecar']")
          foreach ($t in $targets) { $t.ParentNode.RemoveChild($t) | Out-Null }
          $nones = $xml.SelectNodes("//None[contains(@Include, 'native')]")
          foreach ($n in $nones) { $n.ParentNode.RemoveChild($n) | Out-Null }
          $xml.Save($csproj)
          # Patch App.xaml.cs to skip BrowserServices (needs native DLL)
          $appCs = "chrome\windows\App.xaml.cs"
          (Get-Content $appCs) -replace 'Services = new BrowserServices\(\);', '// Services = new BrowserServices(); // stripped for CI' | Set-Content $appCs
          cd chrome\windows
          dotnet build webkitium.csproj -c Debug 2>&1
          Write-Host "Build complete"
          # List output
          Get-ChildItem -Recurse bin\Debug -Filter "*.exe" | ForEach-Object { Write-Host "  $($_.FullName)" }
          Get-ChildItem -Recurse bin\Debug -Filter "*.dll" | Where-Object { $_.Name -like "webkitium*" } | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Launch and screenshot
        shell: pwsh
        run: |
          if (Test-Path "C:\dotnet\dotnet.exe") { $env:PATH = "C:\dotnet;$env:PATH" }
          $outPath = "$env:RUNNER_TEMP\screenshot_windows_shell.png"
          # Compile and run a self-capturing WinForms browser app
          # WinForms works in any session without WindowsAppSDK Runtime
          # Kill any leftover instances from previous runs
          Get-Process -Name WinScreenshotApp -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Process -Name webkitium -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          $csFile = "$env:GITHUB_WORKSPACE\scripts\ci\WinScreenshotApp.cs"
          $exeOut = "$env:RUNNER_TEMP\WinScreenshotApp.exe"
          # Clean stale build artifacts
          Remove-Item -Force "$exeOut" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:RUNNER_TEMP\WinScreenshotApp" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:RUNNER_TEMP\WinScreenshotBuild" -ErrorAction SilentlyContinue
          Write-Host "Compiling WinForms screenshot app..."
          $env:WEBKITIUM_SCREENSHOT_PATH = $outPath
          # Create a minimal .csproj and use dotnet build
          $projDir = "$env:RUNNER_TEMP\WinScreenshotApp"
          New-Item -ItemType Directory -Force -Path $projDir | Out-Null
          Copy-Item $csFile "$projDir\WinScreenshotApp.cs"
          @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>WinExe</OutputType>
              <TargetFramework>net8.0-windows</TargetFramework>
              <UseWindowsForms>true</UseWindowsForms>
            </PropertyGroup>
          </Project>
          "@ | Set-Content "$projDir\WinScreenshotApp.csproj"
          dotnet publish "$projDir\WinScreenshotApp.csproj" -c Release -r win-x64 --self-contained -o "$env:RUNNER_TEMP\WinScreenshotBuild" 2>&1 | Write-Host
          $exeOut = "$env:RUNNER_TEMP\WinScreenshotBuild\WinScreenshotApp.exe"
          if (-not (Test-Path $exeOut)) {
            Write-Host "::error::Compilation failed"
            exit 1
          }
          # Run the renderer (console app, no window needed, works in any session)
          & $exeOut 2>&1 | Write-Host
          $defaultOut = "C:\actions-runner\_work\_temp\screenshot_windows_shell.png"
          if (Test-Path $defaultOut) {
            if ($defaultOut -ne $outPath) { Copy-Item $defaultOut $outPath }
            Write-Host "Screenshot: $outPath"
          } else {
            Write-Host "::error::Screenshot not created"
            exit 1
          }

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-windows
          path: ${{ runner.temp }}/screenshot_windows_shell.png

  ios:
    name: iOS Simulator Screenshot
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS app for simulator
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          PROJ="$RUNNER_TEMP/WebkitiumiOS"
          mkdir -p "$PROJ/Sources"
          # Copy the iOS entry point and BrowserState
          cp "$GITHUB_WORKSPACE/scripts/ci/IOSMain.swift" "$PROJ/Sources/IOSMain.swift"
          cp "$GITHUB_WORKSPACE/chrome/macos/Sources/Webkitium/Views/BrowserState.swift" "$PROJ/Sources/BrowserState.swift"
          # Create Package.swift for iOS
          cat > "$PROJ/Package.swift" << 'EOF'
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "WebkitiumiOS",
              platforms: [.iOS(.v17)],
              products: [.executable(name: "WebkitiumiOS", targets: ["WebkitiumiOS"])],
              targets: [
                  .executableTarget(name: "WebkitiumiOS", path: "Sources")
              ]
          )
          EOF
          cd "$PROJ"
          # Build for iOS Simulator
          swift build --sdk "$(xcrun --sdk iphonesimulator --show-sdk-path)" \
            --triple arm64-apple-ios17.0-simulator 2>&1
          echo "Build complete"

      - name: Boot simulator and install
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          PROJ="$RUNNER_TEMP/WebkitiumiOS"
          # Find the built executable
          APP_BIN=$(find "$PROJ/.build" -name 'WebkitiumiOS' -type f 2>/dev/null | head -1)
          echo "Binary: ${APP_BIN:-NOT FOUND}"

          # Get iOS runtime
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import sys, json
          rts = json.load(sys.stdin)['runtimes']
          ios = [r for r in rts if r['isAvailable'] and 'iOS' in r['name']]
          print(ios[-1]['identifier'] if ios else '')
          ")
          echo "Runtime: $RUNTIME"

          # Create simulator
          SIM_UDID=""
          for dtype in "iPhone-16-Pro" "iPhone-15-Pro" "iPhone-15" "iPhone-14"; do
            SIM_UDID=$(xcrun simctl create "WebkitiumiOSTest" \
              "com.apple.CoreSimulator.SimDeviceType.$dtype" "$RUNTIME" 2>/dev/null) && break
          done
          echo "Simulator: $SIM_UDID"

          xcrun simctl boot "$SIM_UDID"
          sleep 15

          # Create a minimal .app bundle for the simulator
          APP_BUNDLE="$RUNNER_TEMP/Webkitium.app"
          mkdir -p "$APP_BUNDLE"
          cp "$APP_BIN" "$APP_BUNDLE/WebkitiumiOS"
          cat > "$APP_BUNDLE/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>WebkitiumiOS</string>
          <key>CFBundleIdentifier</key><string>dev.webkitium.ios</string>
          <key>CFBundleName</key><string>Webkitium</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>UILaunchStoryboardName</key><string></string>
          <key>MinimumOSVersion</key><string>17.0</string>
          </dict></plist>
          PLIST

          # Install and launch
          xcrun simctl install "$SIM_UDID" "$APP_BUNDLE"
          xcrun simctl launch "$SIM_UDID" dev.webkitium.ios
          sleep 8

          # Screenshot
          xcrun simctl io "$SIM_UDID" screenshot "$RUNNER_TEMP/screenshot_ios_shell.png"

          xcrun simctl shutdown "$SIM_UDID" 2>/dev/null || true
          xcrun simctl delete "$SIM_UDID" 2>/dev/null || true
          echo "Done"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-ios
          path: ${{ runner.temp }}/screenshot_ios_shell.png

  macos:
    name: macOS Shell Screenshot
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS shell
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          # Build the color bridge C++ as a static lib
          cd browser/color
          clang++ -std=c++17 -O2 -fPIC -I.. -c ColorBridgeC.cc ColorRamp.cpp OklchColor.cpp SemanticPalette.cpp
          ar rcs libWebkitiumColor.a ColorBridgeC.o ColorRamp.o OklchColor.o SemanticPalette.o
          COLOR_ABS="$(pwd)"
          echo "Color lib: $COLOR_ABS/libWebkitiumColor.a"
          cd ../../chrome/macos

          # Remove files that depend on extensions/sync/webauthn C bridges
          rm -f Sources/Webkitium/Services/BrowserServices.swift
          # Replace SwiftUI @main App with AppKit NSWindow hosting SwiftUI views
          # SwiftUI Window scenes refuse to open on headless EC2 Mac runners
          rm -f Sources/Webkitium/WebkitiumApp.swift
          cp "$GITHUB_WORKSPACE/scripts/ci/MacOSMain.swift" Sources/Webkitium/MacOSMain.swift

          # Copy color bridge headers + modulemap into the package tree
          mkdir -p CWebkitiumColor
          cp ../../browser/color/ColorBridgeC.h CWebkitiumColor/
          cp ../../browser/color/module.modulemap CWebkitiumColor/

          cat > Package.swift << 'PKGEOF'
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "webkitium",
              platforms: [.macOS(.v14)],
              products: [.executable(name: "webkitium", targets: ["Webkitium"])],
              targets: [
                  .systemLibrary(name: "WebkitiumColor", path: "CWebkitiumColor"),
                  .executableTarget(
                      name: "Webkitium",
                      dependencies: ["WebkitiumColor"],
                      path: "Sources/Webkitium",
                      linkerSettings: [.unsafeFlags(["-L../../browser/color", "-lWebkitiumColor", "-lc++"])]
                  ),
              ]
          )
          PKGEOF

          swift build 2>&1

      - name: Launch and screenshot
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          # SPM puts the binary in .build/debug/webkitium (lowercase)
          APP="$(find chrome/macos/.build -name 'webkitium' -type f -perm +111 2>/dev/null | head -1)"
          if [[ -z "$APP" ]]; then
            APP="$(find chrome/macos/.build -name 'Webkitium' -type f -perm +111 2>/dev/null | head -1)"
          fi
          echo "Binary: ${APP:-NOT FOUND}"
          if [[ -n "$APP" ]]; then
            bash "$GITHUB_WORKSPACE/scripts/ci/macos-screenshot.sh" "$APP" "$RUNNER_TEMP/screenshot_macos_shell.png"
          else
            echo "::error::Binary not found after successful build"
            find chrome/macos/.build -type f -perm +111 2>/dev/null | head -10
            exit 1
          fi

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-macos
          path: ${{ runner.temp }}/screenshot_macos_shell.png

  linux:
    name: Linux GTK Screenshot
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libadwaita-1-dev libwebkitgtk-6.0-dev \
            meson pkg-config xvfb imagemagick 2>/dev/null || true

      - name: Build Linux shell
        run: |
          set -euo pipefail
          cd chrome/linux
          ln -sf ../../browser browser_link
          sed "s|meson.project_source_root() / '\.\.' / '\.\.' / 'browser'|'browser_link'|" meson.build > meson.build.patched
          mv meson.build.patched meson.build
          meson setup builddir
          ninja -C builddir

      - name: Launch in Xvfb and screenshot
        run: |
          set -euo pipefail
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 &
          XVFB_PID=$!
          sleep 2

          cd chrome/linux
          GDK_BACKEND=x11 ./builddir/webkitium &
          APP_PID=$!
          sleep 6

          import -window root "$RUNNER_TEMP/screenshot_linux_shell.png"

          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-linux
          path: ${{ runner.temp }}/screenshot_linux_shell.png

  android:
    name: Android Screenshot
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build Android APK
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          cd chrome/android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      - name: Screenshot via emulator or Device Farm
        env:
          AWS_REGION: us-west-2
        run: |
          set -euo pipefail
          APK="$(find chrome/android -name '*.apk' -path '*/debug/*' | head -1)"
          [[ -f "$APK" ]] || { echo "::error::APK not found"; exit 1; }
          echo "APK: $APK"

          # Read Device Farm project ARN from config
          DEVICEFARM_PROJECT_ARN=$(python3 -c "import json; print(json.load(open('config/build-machines.json')).get('devicefarm',{}).get('projectArn',''))" 2>/dev/null || true)
          if [[ -z "$DEVICEFARM_PROJECT_ARN" ]]; then
            # Fall back to discovering it via AWS CLI
            DEVICEFARM_PROJECT_ARN=$(aws devicefarm list-projects --region us-west-2 --query 'projects[0].arn' --output text 2>/dev/null || true)
          fi
          echo "Device Farm ARN: ${DEVICEFARM_PROJECT_ARN:-(not found)}"
          export DEVICEFARM_PROJECT_ARN

          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"

          # Try emulator first
          EMU_OK=false
          if command -v "$ANDROID_HOME/emulator/emulator" &>/dev/null || command -v emulator &>/dev/null; then
            echo "Trying emulator..."
            AVDS=$("$ANDROID_HOME/emulator/emulator" -list-avds 2>/dev/null || true)
            AVD=$(echo "$AVDS" | head -1)
            if [[ -n "$AVD" ]]; then
              "$ANDROID_HOME/emulator/emulator" -avd "$AVD" -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect &
              EMU_PID=$!
              # Wait for emulator to boot
              for i in $(seq 1 30); do
                BOOT=$("$ANDROID_HOME/platform-tools/adb" shell getprop sys.boot_completed 2>/dev/null || true)
                [[ "$BOOT" == "1" ]] && break
                sleep 5
              done
              if [[ "$BOOT" == "1" ]]; then
                echo "Emulator booted"
                "$ANDROID_HOME/platform-tools/adb" install -r "$APK"
                "$ANDROID_HOME/platform-tools/adb" shell am start -n dev.webkitium/.MainActivity
                sleep 8
                "$ANDROID_HOME/platform-tools/adb" exec-out screencap -p > "$RUNNER_TEMP/screenshot_android_shell.png"
                EMU_OK=true
                echo "Emulator screenshot captured"
              fi
              kill $EMU_PID 2>/dev/null || true
            else
              echo "No AVDs found"
            fi
          fi

          if [[ "$EMU_OK" == "false" ]]; then
            echo "Emulator not available"
            if [[ -z "${DEVICEFARM_PROJECT_ARN:-}" ]]; then
              echo "::error::DEVICEFARM_PROJECT_ARN not set and no emulator available"
              exit 1
            fi

            UPLOAD=$(aws devicefarm create-upload \
              --project-arn "$DEVICEFARM_PROJECT_ARN" \
              --name "webkitium-debug.apk" \
              --type ANDROID_APP \
            --region us-west-2 --output json)
          UPLOAD_ARN=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['arn'])")
          UPLOAD_URL=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['url'])")
          curl -sSf -T "$APK" "$UPLOAD_URL"
          sleep 5

          RUN=$(aws devicefarm schedule-run \
            --project-arn "$DEVICEFARM_PROJECT_ARN" \
            --app-arn "$UPLOAD_ARN" \
            --device-pool-arn "arn:aws:devicefarm:us-west-2::devicepool:082d10e5-d7d7-48a5-ba5c-b33d66efa1f5" \
            --name "shell-screenshot" \
            --test '{"type":"BUILTIN_FUZZ","parameters":{"event_count":"50","throttle":"100"}}' \
            --execution-configuration '{"jobTimeoutMinutes":5}' \
            --region us-west-2 --output json)
          RUN_ARN=$(echo "$RUN" | python3 -c "import sys,json; print(json.load(sys.stdin)['run']['arn'])")

          for i in $(seq 1 20); do
            STATUS=$(aws devicefarm get-run --arn "$RUN_ARN" --region us-west-2 --query 'run.status' --output text)
            echo "status=$STATUS"
            [[ "$STATUS" == "COMPLETED" ]] && break
            sleep 15
          done

          JOB=$(aws devicefarm list-jobs --arn "$RUN_ARN" --region us-west-2 --query 'jobs[0].arn' --output text)
          SCREENSHOT_URL=$(aws devicefarm list-artifacts --arn "$JOB" --type SCREENSHOT --region us-west-2 \
            --query 'artifacts[-1].url' --output text)
          curl -sSf -o "$RUNNER_TEMP/screenshot_android_shell.png" "$SCREENSHOT_URL"
          fi

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-android
          path: ${{ runner.temp }}/screenshot_android_shell.png
