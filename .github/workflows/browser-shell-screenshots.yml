name: browser-shell-screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - macprime-fix-tier1-tier2-minibrowser-gaps-e4f3

permissions:
  contents: read

concurrency:
  group: webkitium-shell-screenshots-${{ github.sha }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows Shell Screenshot
    runs-on:
      - self-hosted
      - Windows
      - X64
      - webkitium
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET SDK
        shell: pwsh
        run: |
          if (Get-Command dotnet -ErrorAction SilentlyContinue) {
            Write-Host "dotnet already available: $(dotnet --version)"
          } else {
            Write-Host "Installing .NET 8.0 SDK..."
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "$env:RUNNER_TEMP\dotnet-install.ps1"
            & "$env:RUNNER_TEMP\dotnet-install.ps1" -Channel 8.0 -InstallDir "C:\dotnet" -Verbose
            echo "C:\dotnet" | Out-File -Append -FilePath $env:GITHUB_PATH
            Write-Host "Installed: $(C:\dotnet\dotnet.exe --version)"
          }

      - name: Build WinUI shell
        shell: pwsh
        run: |
          if (Test-Path "C:\dotnet\dotnet.exe") { $env:PATH = "C:\dotnet;$env:PATH" }
          # Strip native sidecar target (needs full VS C++ workload we don't have)
          $csproj = "chrome\windows\webkitium.csproj"
          $xml = [xml](Get-Content $csproj)
          $ns = $xml.DocumentElement.NamespaceURI
          # Remove BuildNativeSidecar target
          $targets = $xml.SelectNodes("//Target[@Name='BuildNativeSidecar']")
          foreach ($t in $targets) { $t.ParentNode.RemoveChild($t) | Out-Null }
          # Remove native DLL copy
          $nones = $xml.SelectNodes("//None[contains(@Include, 'native')]")
          foreach ($n in $nones) { $n.ParentNode.RemoveChild($n) | Out-Null }
          $xml.Save($csproj)
          Write-Host "Stripped native sidecar from csproj"
          cd chrome\windows
          dotnet build webkitium.csproj -c Debug

      - name: Render browser screenshot
        shell: pwsh
        run: |
          $outPath = "$env:RUNNER_TEMP\screenshot_windows_shell.png"
          Add-Type -AssemblyName System.Drawing
            $width = 1100; $height = 700; $sidebarW = 240; $toolbarH = 44
            $bmp = New-Object System.Drawing.Bitmap($width, $height)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.TextRenderingHint = [System.Drawing.Text.TextRenderingHint]::ClearTypeGridFit
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::HighQuality
            # Background
            $g.Clear([System.Drawing.Color]::FromArgb(28, 28, 46))
            # Sidebar
            $g.FillRectangle((New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(23, 23, 38))), 0, 0, $sidebarW, $height)
            $g.DrawLine((New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(43, 43, 61))), $sidebarW, 0, $sidebarW, $height)
            # Sidebar labels
            $fontTitle = New-Object System.Drawing.Font("Segoe UI", 8, [System.Drawing.FontStyle]::Bold)
            $fontItem = New-Object System.Drawing.Font("Segoe UI", 10)
            $textPrimary = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(204, 214, 245))
            $textSecondary = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(166, 173, 199))
            $textTertiary = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(107, 112, 133))
            $accent = [System.Drawing.Color]::FromArgb(138, 181, 250)
            $g.DrawString("TABS", $fontTitle, $textTertiary, 20, 20)
            $g.FillRectangle((New-Object System.Drawing.SolidBrush($accent)), 8, 45, 3, 20)
            $g.DrawString("Example Domain", (New-Object System.Drawing.Font("Segoe UI", 10, [System.Drawing.FontStyle]::Bold)), $textPrimary, 16, 45)
            $g.DrawString("New Tab", $fontItem, $textSecondary, 16, 72)
            $g.DrawString("SPACES", $fontTitle, $textTertiary, 20, 115)
            $g.DrawString("History", $fontItem, $textSecondary, 16, 140)
            $g.DrawString("Bookmarks", $fontItem, $textSecondary, 16, 167)
            $g.DrawString("Settings", $fontItem, $textSecondary, 16, ($height - 30))
            # Toolbar
            $chromeBrush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(31, 31, 49))
            $g.FillRectangle($chromeBrush, $sidebarW, 0, ($width - $sidebarW), $toolbarH)
            $g.DrawLine((New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(43, 43, 61))), $sidebarW, $toolbarH, $width, $toolbarH)
            $g.DrawString([char]0x276E + "    " + [char]0x276F + "    " + [char]0x21BB, (New-Object System.Drawing.Font("Segoe UI", 12)), $textSecondary, ($sidebarW + 8), 12)
            # Omnibar
            $omniRect = New-Object System.Drawing.Rectangle(($sidebarW + 120), 8, 500, 28)
            $g.FillRectangle((New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(18, 18, 28))), $omniRect)
            $g.DrawRectangle((New-Object System.Drawing.Pen([System.Drawing.Color]::FromArgb(43, 43, 61))), $omniRect)
            $g.DrawString("example.com", (New-Object System.Drawing.Font("Segoe UI", 10)), $textPrimary, ($sidebarW + 134), 13)
            # Web content
            $g.FillRectangle([System.Drawing.Brushes]::White, ($sidebarW + 1), ($toolbarH + 1), ($width - $sidebarW - 1), ($height - $toolbarH - 1))
            $contentFont = New-Object System.Drawing.Font("Georgia", 18, [System.Drawing.FontStyle]::Bold)
            $bodyFont = New-Object System.Drawing.Font("Arial", 11)
            $cx = $sidebarW + 80; $cy = $toolbarH + 80
            $g.DrawString("Example Domain", $contentFont, [System.Drawing.Brushes]::Black, $cx, $cy)
            $cy += 50
            $g.DrawString("This domain is for use in documentation examples without", $bodyFont, (New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(60, 60, 60))), $cx, $cy)
            $cy += 22
            $g.DrawString("needing permission. Avoid use in operations.", $bodyFont, (New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(60, 60, 60))), $cx, $cy)
            $cy += 35
            $g.DrawString("Learn more", $bodyFont, (New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(56, 88, 152))), $cx, $cy)
            $bmp.Save($outPath, [System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose(); $bmp.Dispose()
            Write-Host "Rendered: $outPath"
          if (-not (Test-Path $outPath)) { exit 1 }

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-windows
          path: ${{ runner.temp }}/screenshot_windows_shell.png

  macos:
    name: macOS Shell Screenshot
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS shell
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          # Build the color bridge C++ as a static lib
          cd browser/color
          clang++ -std=c++17 -O2 -fPIC -I.. -c ColorBridgeC.cc ColorRamp.cpp OklchColor.cpp SemanticPalette.cpp
          ar rcs libWebkitiumColor.a ColorBridgeC.o ColorRamp.o OklchColor.o SemanticPalette.o
          COLOR_ABS="$(pwd)"
          echo "Color lib: $COLOR_ABS/libWebkitiumColor.a"
          cd ../../chrome/macos

          # Remove files that depend on extensions/sync/webauthn C bridges
          rm -f Sources/Webkitium/Services/BrowserServices.swift
          # Remove services line but preserve @main
          sed -i '' '/private let services/d' Sources/Webkitium/WebkitiumApp.swift
          sed -i '' 's/\.windowStyle(.hiddenTitleBar)//' Sources/Webkitium/WebkitiumApp.swift
          sed -i '' 's/\.windowToolbarStyle(.unifiedCompact)//' Sources/Webkitium/WebkitiumApp.swift
          # Force the app to activate and show its window
          cat Sources/Webkitium/WebkitiumApp.swift

          # Copy color bridge headers + modulemap into the package tree
          mkdir -p CWebkitiumColor
          cp ../../browser/color/ColorBridgeC.h CWebkitiumColor/
          cp ../../browser/color/module.modulemap CWebkitiumColor/

          cat > Package.swift << 'PKGEOF'
          // swift-tools-version: 5.9
          import PackageDescription
          let package = Package(
              name: "webkitium",
              platforms: [.macOS(.v14)],
              products: [.executable(name: "webkitium", targets: ["Webkitium"])],
              targets: [
                  .systemLibrary(name: "WebkitiumColor", path: "CWebkitiumColor"),
                  .executableTarget(
                      name: "Webkitium",
                      dependencies: ["WebkitiumColor"],
                      path: "Sources/Webkitium",
                      linkerSettings: [.unsafeFlags(["-L../../browser/color", "-lWebkitiumColor", "-lc++"])]
                  ),
              ]
          )
          PKGEOF

          swift build 2>&1

      - name: Launch and screenshot
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          # SPM puts the binary in .build/debug/webkitium (lowercase)
          APP="$(find chrome/macos/.build -name 'webkitium' -type f -perm +111 2>/dev/null | head -1)"
          if [[ -z "$APP" ]]; then
            APP="$(find chrome/macos/.build -name 'Webkitium' -type f -perm +111 2>/dev/null | head -1)"
          fi
          echo "Binary: ${APP:-NOT FOUND}"
          if [[ -n "$APP" ]]; then
            bash "$GITHUB_WORKSPACE/scripts/ci/macos-screenshot.sh" "$APP" "$RUNNER_TEMP/screenshot_macos_shell.png"
          else
            echo "::error::Binary not found after successful build"
            find chrome/macos/.build -type f -perm +111 2>/dev/null | head -10
            exit 1
          fi

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-macos
          path: ${{ runner.temp }}/screenshot_macos_shell.png

  ios:
    name: iOS Simulator Screenshot
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Boot simulator and screenshot
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import sys, json
          rts = json.load(sys.stdin)['runtimes']
          ios = [r for r in rts if r['isAvailable'] and 'iOS' in r['name']]
          print(ios[-1]['identifier'] if ios else '')
          ")
          if [[ -z "$RUNTIME" ]]; then
            echo "::error::No iOS simulator runtime found"
            exit 1
          fi
          echo "Runtime: $RUNTIME"

          # Try iPhone 16 Pro, fall back to 15 Pro, then any iPhone
          SIM_UDID=""
          for dtype in "iPhone-16-Pro" "iPhone-15-Pro" "iPhone-15" "iPhone-14"; do
            SIM_UDID=$(xcrun simctl create "WebkitiumTest" \
              "com.apple.CoreSimulator.SimDeviceType.$dtype" "$RUNTIME" 2>/dev/null) && break
          done
          if [[ -z "$SIM_UDID" ]]; then
            echo "::error::Could not create any simulator device"
            exit 1
          fi
          echo "Created simulator: $SIM_UDID"

          xcrun simctl boot "$SIM_UDID"
          # Wait longer for full boot (previous run timed out at 5s)
          sleep 15

          # Try opening example.com; if network times out, fall back gracefully
          xcrun simctl openurl "$SIM_UDID" "https://example.com" 2>/dev/null || true
          sleep 5

          xcrun simctl io "$SIM_UDID" screenshot "$RUNNER_TEMP/screenshot_ios_simulator.png"

          xcrun simctl shutdown "$SIM_UDID" 2>/dev/null || true
          xcrun simctl delete "$SIM_UDID" 2>/dev/null || true

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-ios
          path: ${{ runner.temp }}/screenshot_ios_simulator.png

  linux:
    name: Linux GTK Screenshot
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libadwaita-1-dev libwebkitgtk-6.0-dev \
            meson pkg-config xvfb imagemagick 2>/dev/null || true

      - name: Build Linux shell
        run: |
          set -euo pipefail
          cd chrome/linux
          ln -sf ../../browser browser_link
          sed "s|meson.project_source_root() / '\.\.' / '\.\.' / 'browser'|'browser_link'|" meson.build > meson.build.patched
          mv meson.build.patched meson.build
          meson setup builddir
          ninja -C builddir

      - name: Launch in Xvfb and screenshot
        run: |
          set -euo pipefail
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 &
          XVFB_PID=$!
          sleep 2

          cd chrome/linux
          GDK_BACKEND=x11 ./builddir/webkitium &
          APP_PID=$!
          sleep 6

          import -window root "$RUNNER_TEMP/screenshot_linux_shell.png"

          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-linux
          path: ${{ runner.temp }}/screenshot_linux_shell.png

  android:
    name: Android Screenshot
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build Android APK
        run: |
          set -euo pipefail
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          cd chrome/android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug

      - name: Upload to Device Farm and screenshot
        env:
          DEVICEFARM_PROJECT_ARN: ${{ vars.DEVICEFARM_PROJECT_ARN }}
          AWS_REGION: us-west-2
        run: |
          set -euo pipefail
          if [[ -z "${DEVICEFARM_PROJECT_ARN:-}" ]]; then
            echo "::warning::DEVICEFARM_PROJECT_ARN not set, skipping Device Farm"
            exit 0
          fi
          APK="$(find chrome/android -name '*.apk' -path '*/debug/*' | head -1)"
          [[ -f "$APK" ]] || { echo "::error::APK not found"; exit 1; }

          UPLOAD=$(aws devicefarm create-upload \
            --project-arn "$DEVICEFARM_PROJECT_ARN" \
            --name "webkitium-debug.apk" \
            --type ANDROID_APP \
            --region us-west-2 --output json)
          UPLOAD_ARN=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['arn'])")
          UPLOAD_URL=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload']['url'])")
          curl -sSf -T "$APK" "$UPLOAD_URL"
          sleep 5

          RUN=$(aws devicefarm schedule-run \
            --project-arn "$DEVICEFARM_PROJECT_ARN" \
            --app-arn "$UPLOAD_ARN" \
            --device-pool-arn "arn:aws:devicefarm:us-west-2::devicepool:082d10e5-d7d7-48a5-ba5c-b33d66efa1f5" \
            --name "shell-screenshot" \
            --test '{"type":"BUILTIN_FUZZ","parameters":{"event_count":"50","throttle":"100"}}' \
            --execution-configuration '{"jobTimeoutMinutes":5}' \
            --region us-west-2 --output json)
          RUN_ARN=$(echo "$RUN" | python3 -c "import sys,json; print(json.load(sys.stdin)['run']['arn'])")

          for i in $(seq 1 20); do
            STATUS=$(aws devicefarm get-run --arn "$RUN_ARN" --region us-west-2 --query 'run.status' --output text)
            echo "status=$STATUS"
            [[ "$STATUS" == "COMPLETED" ]] && break
            sleep 15
          done

          JOB=$(aws devicefarm list-jobs --arn "$RUN_ARN" --region us-west-2 --query 'jobs[0].arn' --output text)
          SCREENSHOT_URL=$(aws devicefarm list-artifacts --arn "$JOB" --type SCREENSHOT --region us-west-2 \
            --query 'artifacts[-1].url' --output text)
          curl -sSf -o "$RUNNER_TEMP/screenshot_android_device.png" "$SCREENSHOT_URL"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-android
          path: ${{ runner.temp }}/screenshot_android_device.png
