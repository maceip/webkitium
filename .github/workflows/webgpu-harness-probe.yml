name: windows-test-webgpu-harness

# Builds the standalone Windows WebGPU harness against the pinned Dawn
# (google/dawn v20260410.140140, matching config/vcpkg-configuration.json)
# and runs the probe suite headlessly. This is an early-warning system:
# if Dawn API surface drifts or the harness stops compiling, this job
# fails in ~5 minutes on a GH-hosted runner, independent of the 75-minute
# self-hosted WebKit build.
#
# The GH windows-2022 runner uses WARP (software D3D12) because it has no
# physical GPU. That's acceptable for API-correctness probes: adapter
# info, device creation, buffer/compute readback, render-pipeline pixel
# verification, and error-callback propagation all work on WARP.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'changes/windows-webgpu-service/harness/**'
      - 'config/webkit-build-matrix.json'
      - 'config/vcpkg-configuration.json'
      - '.github/workflows/webgpu-harness-probe.yml'
  pull_request:
    paths:
      - 'changes/windows-webgpu-service/harness/**'
      - 'config/webkit-build-matrix.json'
      - 'config/vcpkg-configuration.json'
      - '.github/workflows/webgpu-harness-probe.yml'

permissions:
  contents: read

jobs:
  harness:
    name: Harness compile + probe (pinned Dawn)
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Load Dawn tag from matrix
        shell: bash
        run: |
          set -euo pipefail
          python - "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" <<'PY' >> "$GITHUB_ENV"
          import json
          import pathlib
          import sys

          matrix = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          tag = matrix["dawn"]["versionTag"]
          if not tag.startswith("v"):
              raise SystemExit(f"matrix dawn.versionTag must include leading v, got {tag!r}")
          print(f"DAWN_TAG={tag}")
          PY

      - name: Download pinned Dawn release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/dawn"
          cd "$RUNNER_TEMP/dawn"
          gh release download "$DAWN_TAG" \
            --repo google/dawn \
            --pattern 'Dawn-*-windows-latest-Release.tar.gz'
          archive=$(ls Dawn-*-windows-latest-Release.tar.gz | head -1)
          echo "Extracting $archive ($(du -h "$archive" | cut -f1))..."
          tar xzf "$archive"
          rm -f "$archive"
          DAWN_ROOT="$(ls -d "$RUNNER_TEMP"/dawn/Dawn-*-windows-latest-Release | head -1)"
          if [ ! -f "$DAWN_ROOT/include/webgpu/webgpu.h" ]; then
            echo "::error::Dawn extract failed (webgpu.h not at $DAWN_ROOT/include/webgpu/)"
            ls -la "$DAWN_ROOT" || true
            exit 1
          fi
          # Convert to CMake-friendly forward slashes for %DAWN_ROOT% on cmd.
          DAWN_ROOT_FS="$(cygpath -m "$DAWN_ROOT")"
          echo "DAWN_ROOT=$DAWN_ROOT_FS" >> "$GITHUB_ENV"
          echo "Dawn ready at $DAWN_ROOT_FS"

      - name: Configure
        shell: cmd
        run: |
          cmake -S changes\windows-webgpu-service\harness ^
                -B build\webgpu-host ^
                -G "Visual Studio 17 2022" ^
                -A x64 ^
                -DDAWN_ROOT="%DAWN_ROOT%"

      - name: Build
        shell: cmd
        run: |
          cmake --build build\webgpu-host --config Release

      - name: Run probe suite
        shell: cmd
        run: |
          build\webgpu-host\Release\webgpu_host.exe ^
            --probe ^
            --suite adapter,device,buffer,compute,render,errors ^
            --no-scene --headless ^
            --backend undefined ^
            --frames 1 ^
            --json "%RUNNER_TEMP%\harness-report.json"

      - name: Upload harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webgpu-harness-report-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/harness-report.json
            build/webgpu-host/Release/webgpu_host.exe
          if-no-files-found: warn

      - name: Assert probesOk
        shell: bash
        run: |
          set -euo pipefail
          REPORT="$(cygpath -u "$RUNNER_TEMP/harness-report.json")"
          if [ ! -f "$REPORT" ]; then
            echo "::error::harness produced no report at $REPORT"
            exit 1
          fi
          echo "=== harness report ==="
          cat "$REPORT"
          echo
          gpu_available=$(jq -r '.runtime.gpuAvailable // false' "$REPORT")
          queue_available=$(jq -r '.runtime.queueAvailable // false' "$REPORT")
          probes_ok=$(jq -r '.runtime.probesOk // true' "$REPORT")
          if [ "$gpu_available" != "true" ]; then
            echo "::error::gpuAvailable=false — Dawn/D3D12 failed to bring up"
            exit 1
          fi
          if [ "$queue_available" != "true" ]; then
            echo "::error::queueAvailable=false — device/queue path broken"
            exit 1
          fi
          if [ "$probes_ok" != "true" ]; then
            echo "::error::one or more probes failed"
            # Emit per-probe failures for the summary.
            jq -r '.runtime.probes | to_entries[] | select(.value.ok == false) | "::error::probe \(.key): \(.value.detail // "no detail")"' "$REPORT"
            exit 1
          fi
          echo "All probes ok."
