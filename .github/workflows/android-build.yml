name: android-build

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-android-build
  cancel-in-progress: false

jobs:
  build:
    name: Android WebKit Build
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Source
        run: |
          set -euo pipefail

          SRC="$HOME/webkit/wpe-android"

          if [ ! -d "$SRC" ]; then
            echo "::error::Expected checkout at $SRC not found"
            exit 1
          fi
          echo "Source ready at $SRC"

          # Apply patches
          applied=0
          for patch in "$GITHUB_WORKSPACE"/webkit/patches/common/*.patch "$GITHUB_WORKSPACE"/webkit/patches/android/*.patch; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$patch" || true
            applied=$((applied + 1))
          done
          echo "Applied $applied patches."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: |
          set -euo pipefail
          SRC="$HOME/webkit/wpe-android"
          cd "$SRC"

          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ 2>/dev/null | sort -V | tail -1)}"
          # Disable clang-tidy — upstream WPE code triggers cognitive-complexity with -Werror
          TIDY="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang-tidy"
          if [ -f "$TIDY" ]; then
            mv "$TIDY" "$TIDY.disabled"
          fi
          # Clear CMake cache so it doesn't reference the old clang-tidy path
          rm -rf "$SRC/wpeview/.cxx" 2>/dev/null || true

          # WPE-Android uses Gradle
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease -PdisableClangTidy=true
          else
            echo "::error::No gradlew found — expected WPE-Android repo"
            exit 1
          fi

      - name: Restore clang-tidy
        if: always()
        run: |
          TIDY="$HOME/Android/Sdk/ndk/$(ls $HOME/Android/Sdk/ndk/ 2>/dev/null | sort -V | tail -1)/toolchains/llvm/prebuilt/linux-x86_64/bin/clang-tidy"
          [ -f "$TIDY.disabled" ] && mv "$TIDY.disabled" "$TIDY" || true

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ~/webkit/wpe-android/*/build/outputs/
          if-no-files-found: warn
