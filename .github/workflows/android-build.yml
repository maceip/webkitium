name: android-release

# Operational rule
# When you re-cut webkit-pin or bump Dawn / vcpkg:
#
# Update config/webkit-build-matrix.json.
# Update config/vcpkg-configuration.json if the Dawn baseline changes.
# Update config/windows-webgpu-dawn-green.json if you use it as a green reference (CI will fail if it disagrees with the matrix).

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Upload baseline assets to this GitHub release tag (created if missing, marked latest). Leave empty for rolling ci-debug-builds."
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  CI_DEBUG_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || 'ci-debug-builds' }}

concurrency:
  group: webkitium-android-build
  cancel-in-progress: false

jobs:
  patches:
    name: Android Patch Check
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Android patch series
        run: |
          set -euo pipefail
          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          [[ -d "$SRC/.git" ]] || { echo "::error::Expected checkout at $SRC not found"; exit 1; }
          python3 "$GITHUB_WORKSPACE/config/apply_webkit_patches.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --webkit-root "$SRC" \
            --platform android \
            --no-common-patches \
            --skip-pin-check \
            --mode check

  build:
    name: Android WebKit Build
    needs: [patches]
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 240
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GitHub release exists for artifact uploads
        run: bash "$GITHUB_WORKSPACE/scripts/ci_ensure_release_assets_target.sh"

      - name: Prepare Source
        run: |
          set -euo pipefail

          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          echo "NG_ANDROID_SOURCE=$SRC" >> "$GITHUB_ENV"

          if [ ! -d "$SRC" ]; then
            echo "::error::Expected checkout at $SRC not found"
            exit 1
          fi
          echo "Source ready at $SRC"

          # Reset any previously applied patches (checkout is persistent)
          git -C "$SRC" checkout -- . 2>/dev/null || true

          # Apply patches (fail fast — silent patch drift wastes hours on Gradle)
          # Android patches target WPE-Android, not the WebKit tree — skip common/.
          python3 "$GITHUB_WORKSPACE/config/apply_webkit_patches.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --webkit-root "$SRC" \
            --platform android \
            --no-common-patches \
            --skip-pin-check \
            --mode apply
          echo "WEBKITIUM_BROWSER_SHELL_TARGET=android" >> "$GITHUB_ENV"

      - name: Build
        run: |
          set -euo pipefail
          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          cd "$SRC"

          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          ndk_ver="$(ls "$ANDROID_HOME/ndk/" 2>/dev/null | sort -V | tail -1)"
          if [[ -z "${ndk_ver:-}" ]]; then
            echo "::error::No NDK under \$ANDROID_HOME/ndk (ANDROID_HOME=$ANDROID_HOME)"
            exit 1
          fi
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_HOME/ndk/$ndk_ver}"
          ndk_prebuilt_host() {
            local base="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt"
            [[ -d "$base" ]] || { echo ""; return; }
            if [[ -d "$base/linux-aarch64" ]]; then echo linux-aarch64
            elif [[ -d "$base/linux-arm64" ]]; then echo linux-arm64
            elif [[ -d "$base/linux-x86_64" ]]; then echo linux-x86_64
            else
              find "$base" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | head -1
            fi
          }
          PREBUILT="$(ndk_prebuilt_host)"
          if [[ -z "$PREBUILT" ]]; then
            echo "::error::No llvm prebuilt under $ANDROID_NDK_HOME/toolchains/llvm/prebuilt"
            exit 1
          fi
          echo "NDK prebuilt host: $PREBUILT"

          # WPE-Android uses Gradle
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.native.buildOutput=verbose \
            -PCMAKE_CXX_CLANG_TIDY=""

      - name: Baseline package
        run: |
          set -euo pipefail
          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          RUN_ID="${GITHUB_RUN_ID:-local}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          APK_DIR="$OUT_ROOT/apk"
          mkdir -p "$APK_DIR"
          count=0
          while IFS= read -r f; do
            [[ -n "$f" ]] || continue
            cp -f "$f" "$APK_DIR/"
            count=$((count + 1))
          done < <(find "$SRC" -type f -name '*-debug.apk' 2>/dev/null | head -20)
          if [[ "$count" -eq 0 ]]; then
            echo "::error::No debug APK files found under $SRC" >&2
            exit 1
          fi
          MANIFEST="$OUT_ROOT/baseline-android-debug-${SHORT_SHA}-${RUN_ID}.json"
          export ANDROID_BASELINE_APK_DIR="$APK_DIR"
          export ANDROID_BASELINE_MANIFEST="$MANIFEST"
          export ANDROID_BASELINE_RUN_ID="$RUN_ID"
          export ANDROID_BASELINE_RUN_ATTEMPT="$RUN_ATTEMPT"
          python3 <<'PY'
          import json, os, time, pathlib
          apk_dir = pathlib.Path(os.environ["ANDROID_BASELINE_APK_DIR"])
          rows = [
              {"name": n, "bytes": (apk_dir / n).stat().st_size}
              for n in sorted(os.listdir(apk_dir))
              if n.endswith(".apk")
          ]
          doc = {
              "platform": "android",
              "created": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "runId": os.environ["ANDROID_BASELINE_RUN_ID"],
              "attempt": os.environ["ANDROID_BASELINE_RUN_ATTEMPT"],
              "apks": rows,
          }
          pathlib.Path(os.environ["ANDROID_BASELINE_MANIFEST"]).write_text(json.dumps(doc, indent=2))
          PY
          echo "BASELINE_OK platform=android apks=$count"

      - name: Upload debug assets to GitHub release
        if: success()
        run: |
          set -euo pipefail
          TAG="${CI_DEBUG_RELEASE_TAG:-ci-debug-builds}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          STAGE="${RUNNER_TEMP}/release-upload"
          mkdir -p "$STAGE"
          shopt -s nullglob
          for f in "$OUT_ROOT"/* "$OUT_ROOT"/apk/*; do
            [[ -f "$f" ]] || continue
            base="$(basename "$f")"
            dest="$STAGE/webkitium-debug-android-${SHORT_SHA}-${base}"
            cp -f "$f" "$dest"
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "$dest"
          done

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.NG_ANDROID_SOURCE }}/**/build/outputs/
            ${{ runner.temp }}/baseline-packages
          if-no-files-found: warn
