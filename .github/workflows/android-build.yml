name: android-release

# Operational rule
# When you re-cut webkit-pin or bump Dawn / vcpkg:
#
# Update config/webkit-build-matrix.json.
# Update config/vcpkg-configuration.json if the Dawn baseline changes.
# Update config/windows-webgpu-dawn-green.json if you use it as a green reference (CI will fail if it disagrees with the matrix).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-android-build
  cancel-in-progress: false

jobs:
  build:
    name: Android WebKit Build
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Source
        run: |
          set -euo pipefail

          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          echo "NG_ANDROID_SOURCE=$SRC" >> "$GITHUB_ENV"

          if [ ! -d "$SRC" ]; then
            echo "::error::Expected checkout at $SRC not found"
            exit 1
          fi
          echo "Source ready at $SRC"

          # Apply patches (fail fast — silent patch drift wastes hours on Gradle)
          # Android patches target WPE-Android, not the WebKit tree — skip common/.
          applied=0
          for patch in "$GITHUB_WORKSPACE"/webkit/patches/android/*.patch; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            git -C "$SRC" apply --check --whitespace=nowarn --unidiff-zero "$patch"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$patch"
            applied=$((applied + 1))
          done
          echo "Applied $applied patches."
          echo "WEBKITIUM_BROWSER_SHELL_TARGET=android" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: |
          set -euo pipefail
          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          cd "$SRC"

          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          ndk_ver="$(ls "$ANDROID_HOME/ndk/" 2>/dev/null | sort -V | tail -1)"
          if [[ -z "${ndk_ver:-}" ]]; then
            echo "::error::No NDK under \$ANDROID_HOME/ndk (ANDROID_HOME=$ANDROID_HOME)"
            exit 1
          fi
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_HOME/ndk/$ndk_ver}"
          ndk_prebuilt_host() {
            local base="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt"
            [[ -d "$base" ]] || { echo ""; return; }
            if [[ -d "$base/linux-aarch64" ]]; then echo linux-aarch64
            elif [[ -d "$base/linux-arm64" ]]; then echo linux-arm64
            elif [[ -d "$base/linux-x86_64" ]]; then echo linux-x86_64
            else
              find "$base" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | head -1
            fi
          }
          PREBUILT="$(ndk_prebuilt_host)"
          if [[ -z "$PREBUILT" ]]; then
            echo "::error::No llvm prebuilt under $ANDROID_NDK_HOME/toolchains/llvm/prebuilt"
            exit 1
          fi
          echo "NDK prebuilt host: $PREBUILT"

          # WPE-Android uses Gradle
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.native.buildOutput=verbose \
            -PCMAKE_CXX_CLANG_TIDY=""

      - name: Baseline package
        run: |
          set -euo pipefail
          SRC="${NG_ANDROID_SOURCE:-$HOME/webkit/wpe-android}"
          RUN_ID="${GITHUB_RUN_ID:-local}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          APK_DIR="$OUT_ROOT/apk"
          mkdir -p "$APK_DIR"
          count=0
          while IFS= read -r f; do
            [[ -n "$f" ]] || continue
            cp -f "$f" "$APK_DIR/"
            count=$((count + 1))
          done < <(find "$SRC" -type f -name '*.apk' 2>/dev/null | head -20)
          if [[ "$count" -eq 0 ]]; then
            echo "::error::No APK files found under $SRC" >&2
            exit 1
          fi
          MANIFEST="$OUT_ROOT/baseline-android-${RUN_ID}.json"
          export ANDROID_BASELINE_APK_DIR="$APK_DIR"
          export ANDROID_BASELINE_MANIFEST="$MANIFEST"
          export ANDROID_BASELINE_RUN_ID="$RUN_ID"
          export ANDROID_BASELINE_RUN_ATTEMPT="$RUN_ATTEMPT"
          python3 <<'PY'
          import json, os, time, pathlib
          apk_dir = pathlib.Path(os.environ["ANDROID_BASELINE_APK_DIR"])
          rows = [
              {"name": n, "bytes": (apk_dir / n).stat().st_size}
              for n in sorted(os.listdir(apk_dir))
              if n.endswith(".apk")
          ]
          doc = {
              "platform": "android",
              "created": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "runId": os.environ["ANDROID_BASELINE_RUN_ID"],
              "attempt": os.environ["ANDROID_BASELINE_RUN_ATTEMPT"],
              "apks": rows,
          }
          pathlib.Path(os.environ["ANDROID_BASELINE_MANIFEST"]).write_text(json.dumps(doc, indent=2))
          PY
          echo "BASELINE_OK platform=android apks=$count"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ~/webkit/wpe-android/*/build/outputs/
            ${{ runner.temp }}/baseline-packages
          if-no-files-found: warn
