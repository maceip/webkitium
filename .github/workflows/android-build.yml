name: android-build

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-android-build
  cancel-in-progress: false

jobs:
  build:
    name: Android WebKit Build
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Source
        run: |
          set -euo pipefail

          SRC="$HOME/wpe-android"
          REPO="https://github.com/Igalia/wpe-android.git"

          # WPE-Android is a separate repo — clone or update it
          if [ -d "$SRC/.git" ]; then
            echo "Updating existing WPE-Android checkout..."
            cd "$SRC"
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
          else
            echo "Cloning WPE-Android..."
            rm -rf "$SRC"
            git clone --depth 1 "$REPO" "$SRC"
          fi

          echo "Source ready at $SRC"

          # Apply patches
          applied=0
          for patch in "$GITHUB_WORKSPACE"/webkit/patches/common/*.patch "$GITHUB_WORKSPACE"/webkit/patches/android/*.patch; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$patch" || true
            applied=$((applied + 1))
          done
          echo "Applied $applied patches."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: |
          set -euo pipefail
          SRC="$HOME/wpe-android"
          cd "$SRC"

          export ANDROID_HOME="${ANDROID_HOME:-$HOME/Android/Sdk}"
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk/ 2>/dev/null | sort -V | tail -1)}"

          # WPE-Android uses Gradle
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            echo "::error::No gradlew found — expected WPE-Android repo"
            exit 1
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ~/wpe-android/build/outputs/
          if-no-files-found: warn

      - name: Cleanup Source
        if: always()
        run: rm -rf "$HOME/wpe-android"
