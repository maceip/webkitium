name: ios-release

# Operational rule
# When you re-cut webkit-pin or bump Dawn / vcpkg:
#
# Update config/webkit-build-matrix.json.
# Update config/vcpkg-configuration.json if the Dawn baseline changes.
# Update config/windows-webgpu-dawn-green.json if you use it as a green reference (CI will fail if it disagrees with the matrix).

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Upload baseline assets to this GitHub release tag (created if missing, marked latest). Leave empty for rolling ci-debug-builds."
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  CI_DEBUG_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || 'ci-debug-builds' }}

concurrency:
  group: webkitium-ios-build
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  patches:
    name: iOS WebKit Patch Check
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Load CI matrix into environment
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/config/ci_matrix_env.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" >> "$GITHUB_ENV"

      - name: Check iOS WebKit patch series
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          PERSIST="${NG_IOS_WEBKIT_PATH:-$HOME/W/webkit-ios-src}"
          if [[ -d "$PERSIST/.git" ]]; then
            echo "Using persistent iOS WebKit tree at $PERSIST"
            python3 "$GITHUB_WORKSPACE/config/apply_webkit_patches.py" \
              --repo-root "$GITHUB_WORKSPACE" \
              --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
              --changes "$GITHUB_WORKSPACE/config/changes.json" \
              --webkit-root "$PERSIST" \
              --platform ios \
              --skip-pin-check \
              --mode check
          else
            SRC="${NG_IOS_PATCH_CHECK_PATH:-$HOME/W/webkit-ios-patch-check}"
            bash "$GITHUB_WORKSPACE/scripts/ci_prepare_webkit_source.sh" "$SRC"
            python3 "$GITHUB_WORKSPACE/config/apply_webkit_patches.py" \
              --repo-root "$GITHUB_WORKSPACE" \
              --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
              --changes "$GITHUB_WORKSPACE/config/changes.json" \
              --webkit-root "$SRC" \
              --platform ios \
              --mode check
          fi

      - name: Cleanup patch check source
        if: always()
        run: |
          rm -rf "${NG_IOS_PATCH_CHECK_PATH:-$HOME/W/webkit-ios-patch-check}"

  build:
    name: iOS Simulator WebKit Build
    needs: [patches]
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 1440
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GitHub release exists for artifact uploads
        run: bash "$GITHUB_WORKSPACE/scripts/ci_ensure_release_assets_target.sh"

      - name: Load CI matrix into environment
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/config/ci_matrix_env.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" >> "$GITHUB_ENV"

      - name: Prepare source
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          SRC="${NG_IOS_WEBKIT_PATH:-$HOME/W/webkit-ios-src}"
          echo "WEBKIT_SRC=$SRC" >> "$GITHUB_ENV"
          bash "$GITHUB_WORKSPACE/scripts/ci_prepare_webkit_source.sh" "$SRC"
          python3 "$GITHUB_WORKSPACE/config/apply_webkit_patches.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
            --changes "$GITHUB_WORKSPACE/config/changes.json" \
            --webkit-root "$SRC" \
            --platform ios \
            --mode apply

          {
            sw_vers || true
            uname -a
            xcodebuild -version || true
            xcrun simctl list runtimes || true
            command -v gh
            command -v cmake ninja python3 ruby perl
          } | tee "${RUNNER_TEMP}/ios-ci-environment.txt" || true
          echo "WEBKITIUM_BROWSER_SHELL_TARGET=ios" >> "$GITHUB_ENV"

      - name: Build
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"

          SRC="${WEBKIT_SRC:?WEBKIT_SRC missing}"
          cd "$SRC"
          JOBS="$(sysctl -n hw.ncpu 2>/dev/null || echo 4)"

          if command -v sccache >/dev/null 2>&1; then
            export SCCACHE_DIR="${SCCACHE_DIR:-$HOME/webkit-sccache/ios-gh}"
            mkdir -p "$SCCACHE_DIR"
            export SCCACHE_CACHE_SIZE="${SCCACHE_CACHE_SIZE:-50G}"
            export SCCACHE_IDLE_TIMEOUT=0
            sccache --start-server 2>/dev/null || true
            sccache --zero-stats
            SCCACHE_CMAKE=(-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache)
          else
            SCCACHE_CMAKE=()
          fi

          LOG="${RUNNER_TEMP}/build-webkit-ios.log"
          set -o pipefail
          perl Tools/Scripts/build-webkit --debug --ios-simulator --makeargs="-j$JOBS" \
            -DENABLE_EXPERIMENTAL_FEATURES="${WEBKIT_CMAKE_ENABLE_EXPERIMENTAL_FEATURES:-ON}" \
            -DENABLE_WEBXR="${WEBKIT_CMAKE_ENABLE_WEBXR:-OFF}" \
            "${SCCACHE_CMAKE[@]}" \
            2>&1 | tee "$LOG"
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats
          fi

      - name: Build platform chrome (SwiftUI shell)
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          cd "$GITHUB_WORKSPACE/chrome/ios"
          xcodebuild -project Webkitium.xcodeproj -scheme Webkitium \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build build
          APP="$(find build -name 'Webkitium.app' -type d | head -1)"
          [[ -n "$APP" ]] || { echo "::error::Webkitium.app not built"; exit 1; }
          ENGINE="$SRC/WebKitBuild/Debug"
          chmod +x "$GITHUB_WORKSPACE/scripts/ios_embed_webkit_frameworks.sh"
          bash "$GITHUB_WORKSPACE/scripts/ios_embed_webkit_frameworks.sh" "$APP" "$ENGINE"

      - name: Baseline package (engine + chrome)
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          SRC="${WEBKIT_SRC:?}"
          ROOT="$SRC/WebKitBuild"
          RUN_ID="${GITHUB_RUN_ID:-local}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          mkdir -p "$OUT_ROOT"
          FIRST="$(find "$ROOT" \( -name 'MiniBrowser.app' -o -name 'MobileMiniBrowser.app' \) -type d 2>/dev/null | head -1)"
          [[ -n "$FIRST" ]] || { echo "::error::No MiniBrowser under $ROOT"; exit 1; }
          ENGINE_STAGE="${RUNNER_TEMP}/ios-engine-stage"
          rm -rf "$ENGINE_STAGE"
          mkdir -p "$ENGINE_STAGE"
          cp -a "$FIRST" "$ENGINE_STAGE/"
          CHROME="$(find "$GITHUB_WORKSPACE/chrome/ios/build" -name 'Webkitium.app' -type d | head -1)"
          [[ -n "$CHROME" ]] || { echo "::error::Webkitium.app not built under chrome/ios"; exit 1; }
          TAR="$OUT_ROOT/webkitium-ios-${SHORT_SHA}-${RUN_ID}-${RUN_ATTEMPT}.tar.gz"
          bash "$GITHUB_WORKSPACE/scripts/bundle_webkitium_platform.sh" ios "$TAR" "$ENGINE_STAGE" "$CHROME"
          echo "BASELINE_OK platform=ios tar=$TAR"

      - name: Upload debug assets to GitHub release
        if: success()
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          TAG="${CI_DEBUG_RELEASE_TAG:-ci-debug-builds}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          STAGE="${RUNNER_TEMP}/release-upload"
          mkdir -p "$STAGE"
          shopt -s nullglob
          for f in "$OUT_ROOT"/*; do
            [[ -f "$f" ]] || continue
            base="$(basename "$f")"
            dest="$STAGE/webkitium-debug-ios-${SHORT_SHA}-${base}"
            cp -f "$f" "$dest"
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "$dest"
          done

      - name: Post-build check
        run: |
          set -euo pipefail
          SRC="${WEBKIT_SRC:?}"
          OUT="$SRC/WebKitBuild"
          find "$OUT" -maxdepth 3 \( -name 'MobileMiniBrowser.app' -o -name 'MobileSafari.app' -o -name 'JavaScriptCore.framework' -o -name 'WebKit.framework' \) -print | tee "${RUNNER_TEMP}/ios-products.txt"
          test -s "${RUNNER_TEMP}/ios-products.txt"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.WEBKIT_SRC }}/WebKitBuild
            ${{ runner.temp }}/build-webkit-ios.log
            ${{ runner.temp }}/ios-ci-environment.txt
            ${{ runner.temp }}/ios-products.txt
            ${{ runner.temp }}/baseline-packages
          if-no-files-found: warn
