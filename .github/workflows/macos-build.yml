name: macos-build

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-macos-build
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: macOS WebKit Build
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - webkitium
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Load CI matrix into environment
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/config/ci_matrix_env.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" >> "$GITHUB_ENV"

      - name: Ensure Metal Toolchain
        run: |
          sudo xcodebuild -license accept 2>/dev/null || true
          if xcrun --find metal >/dev/null 2>&1; then
            echo "Metal toolchain already installed"
          else
            echo "Installing Metal toolchain..."
            sudo xcodebuild -downloadComponent MetalToolchain
          fi

      - name: Prepare source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          command -v gh >/dev/null 2>&1 || { echo "::error::gh CLI not found (install: brew install gh)"; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "::error::git not found on PATH"; exit 1; }
          SRC="${NG_MACOS_WEBKIT_SRC:-$HOME/webkit-src}"
          echo "WEBKIT_SRC=$SRC" >> "$GITHUB_ENV"
          echo "WEBKITIUM_BROWSER_SHELL_TARGET=macos" >> "$GITHUB_ENV"
          ARCHIVE="${RUNNER_TEMP}/webkit-pin.tar.gz"
          rm -rf "$SRC"
          mkdir -p "$SRC"
          cd "$RUNNER_TEMP"
          gh release download "${WEBKIT_PIN_RELEASE_TAG:?WEBKIT_PIN_RELEASE_TAG missing — run Load CI matrix step}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${WEBKIT_PIN_PART_GLOB:?WEBKIT_PIN_PART_GLOB missing}"
          shopt -s nullglob
          parts=( ${WEBKIT_PIN_PART_GLOB} )
          if (( ${#parts[@]} == 0 )); then
            echo "::error::No tarball parts matched WEBKIT_PIN_PART_GLOB after gh release download"
            exit 1
          fi
          sorted=()
          while IFS= read -r line; do
            [[ -n "$line" ]] && sorted+=("$line")
          done < <(printf '%s\n' "${parts[@]}" | LC_ALL=C sort -V)
          cat "${sorted[@]}" > "$ARCHIVE"
          rm -f ${WEBKIT_PIN_PART_GLOB}
          shopt -u nullglob
          [[ -s "$ARCHIVE" ]] || { echo "::error::Stitched webkit-pin archive is empty"; exit 1; }
          tar -xzf "$ARCHIVE" --strip-components=1 -C "$SRC"
          rm -f "$ARCHIVE"
          if [[ ! -d "$SRC/Source" ]]; then
            echo "::error::Extraction failed — Source/ directory missing"
            exit 1
          fi
          python3 "$GITHUB_WORKSPACE/config/verify_webkit_pin_commit.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
            --webkit-root "$SRC"
          echo "Source ready at $SRC"
          for patch in "$GITHUB_WORKSPACE"/webkit/patches/common/*.patch "$GITHUB_WORKSPACE"/webkit/patches/macos/*.patch; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            git -C "$SRC" apply --check --whitespace=nowarn --unidiff-zero "$patch"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$patch"
          done

      - name: Build
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          SRC="${WEBKIT_SRC:?}"
          cd "$SRC"
          export WEBKITIUM_BROWSER_SHELL_TARGET=macos
          JOBS="$(sysctl -n hw.ncpu 2>/dev/null || echo 4)"
          perl Tools/Scripts/build-webkit --release --makeargs="-j$JOBS" \
            -DENABLE_EXPERIMENTAL_FEATURES="${WEBKIT_CMAKE_ENABLE_EXPERIMENTAL_FEATURES:-ON}" \
            -DENABLE_WEBXR="${WEBKIT_CMAKE_ENABLE_WEBXR:-OFF}"

      - name: Baseline package
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:$PATH"
          SRC="${WEBKIT_SRC:?}"
          ROOT="$SRC/WebKitBuild/Release"
          PLATFORM=macos
          RUN_ID="${GITHUB_RUN_ID:-local}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          mkdir -p "$OUT_ROOT"
          stamp() { date -u +%Y-%m-%dT%H:%M:%SZ; }
          [[ -d "$ROOT" ]] || { echo "::error::Build output dir missing: $ROOT" >&2; exit 1; }
          TAR="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.tar.gz"
          if [[ -d "$ROOT/bin" ]]; then
            tar -czf "$TAR" -C "$ROOT" bin
          else
            tar -czf "$TAR" -C "$ROOT" .
          fi
          [[ -s "$TAR" ]] || { echo "::error::Baseline tarball empty: $TAR"; exit 1; }
          DMG="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.dmg"
          PKG="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.pkg"
          if [[ "$PLATFORM" == macos ]] && command -v hdiutil >/dev/null 2>&1; then
            STAGING="$OUT_ROOT/.dmg-staging-$RUN_ID"
            rm -rf "$STAGING"
            mkdir -p "$STAGING"
            if [[ -d "$ROOT/bin/MiniBrowser.app" ]]; then
              cp -a "$ROOT/bin/MiniBrowser.app" "$STAGING/"
            elif compgen -G "$ROOT/bin/"*.app >/dev/null; then
              cp -a "$ROOT/bin/"*.app "$STAGING/" 2>/dev/null || true
            else
              cp -a "$ROOT/bin" "$STAGING/" 2>/dev/null || cp -a "$ROOT" "$STAGING/out"
            fi
            if ! hdiutil create -volname "WebKitMiniBrowser-baseline" -srcfolder "$STAGING" -ov -format UDZO "$DMG"; then
              echo "::warning::hdiutil create failed; using tarball symlink for .dmg artifact name"
              rm -f "$DMG"
              rm -rf "$STAGING"
              ln -sf "$(basename "$TAR")" "$DMG" 2>/dev/null || cp "$TAR" "$DMG"
            else
              rm -rf "$STAGING"
            fi
          else
            ln -sf "$(basename "$TAR")" "$DMG" 2>/dev/null || cp "$TAR" "$DMG"
          fi
          printf '%s\n' "Placeholder PKG: use productbuild --root once signing/bundle layout is fixed." >"$PKG"
          export BASELINE_JSON_DIR="$OUT_ROOT"
          export BASELINE_PLATFORM="$PLATFORM"
          export BASELINE_RUN_ID="$RUN_ID"
          export BASELINE_RUN_ATTEMPT="$RUN_ATTEMPT"
          export BASELINE_TARBALL="$(basename "$TAR")"
          export BASELINE_DMG="$(basename "$DMG")"
          export BASELINE_PKG="$(basename "$PKG")"
          export BASELINE_CREATED="$(stamp)"
          python3 <<'PY'
          import json, os, pathlib
          out = pathlib.Path(os.environ["BASELINE_JSON_DIR"]) / f"baseline-{os.environ['BASELINE_PLATFORM']}-{os.environ['BASELINE_RUN_ID']}.json"
          doc = {
              "platform": os.environ["BASELINE_PLATFORM"],
              "created": os.environ["BASELINE_CREATED"],
              "runId": os.environ["BASELINE_RUN_ID"],
              "attempt": os.environ["BASELINE_RUN_ATTEMPT"],
              "tarball": os.environ["BASELINE_TARBALL"],
              "dmgOrArchive": os.environ["BASELINE_DMG"],
              "pkg": os.environ["BASELINE_PKG"],
              "note": "macOS: hdiutil DMG when MiniBrowser.app exists; PKG placeholder until productbuild.",
          }
          out.write_text(json.dumps(doc, indent=2))
          PY
          echo "BASELINE_OK platform=$PLATFORM tar=$TAR"

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.WEBKIT_SRC }}/WebKitBuild/Release/bin
            ${{ env.WEBKIT_SRC }}/WebKitBuild/Release/CMakeCache.txt
            ${{ runner.temp }}/baseline-packages
          if-no-files-found: warn

      - name: Cleanup Source
        if: always()
        run: |
          set -euo pipefail
          d="${WEBKIT_SRC:-}"
          if [[ -n "$d" && "$d" != "/" && "$d" != "$HOME" && "$d" != "$HOME/" ]]; then
            rm -rf "$d"
          fi
