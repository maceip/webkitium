name: linux-ci

on:
  push:
    branches: [master]
    paths:
      - 'chrome/linux/**'
      - 'browser/url/**'
      - 'browser/suggestions/**'
      - '.github/workflows/linux-ci.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: linux-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libgtk-4-dev libwebkitgtk-6.0-dev libclang-dev \
            libprotobuf-dev libsqlite3-dev protobuf-compiler \
            xvfb x11-utils xdotool imagemagick scrot \
            dbus-x11 at-spi2-core

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            chrome/linux/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('chrome/linux/Cargo.lock') }}

      - name: Cargo build
        working-directory: chrome/linux
        run: cargo build --release

      - name: Run app under Xvfb and capture screenshot
        run: |
          BIN=$(find chrome/linux/target/release -maxdepth 1 -type f -executable | grep -v "\.d$" | head -1)
          echo "BIN=$BIN"
          file "$BIN"

          # Xvfb session
          Xvfb :99 -screen 0 1280x800x24 -ac +render -noreset >/tmp/xvfb.log 2>&1 &
          XVFB=$!
          sleep 2

          # Env for headless GTK/WebKitGTK on GHA
          export DISPLAY=:99
          export GTK_A11Y=none
          export NO_AT_BRIDGE=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1
          export WEBKIT_FORCE_SANDBOX=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export GDK_BACKEND=x11
          export GSK_RENDERER=cairo

          # Wrap app launch in dbus-run-session so a session bus exists.
          # WEBKITIUM_LAUNCH_URL is honored by the GTK shell on startup so we
          # don't have to drive the URL Entry via xdotool (which has been
          # unreliable on Xvfb sessions without an active focus owner).
          export WEBKITIUM_LAUNCH_URL='https://en.wikipedia.org'
          dbus-run-session -- bash -c "
            '$BIN' >/tmp/app.log 2>&1 &
            APP=\$!
            sleep 8
            if ! ps -p \$APP >/dev/null; then
              echo 'APP CRASHED'
              tail -80 /tmp/app.log
              exit 13
            fi

            # Wait for Wikipedia to fetch + render under software rendering.
            sleep 15

            # Capture
            import -window root /tmp/webkitium-linux-wikipedia.png || scrot /tmp/webkitium-linux-wikipedia.png
            ls -la /tmp/webkitium-linux-wikipedia.png
            kill \$APP 2>/dev/null || true
          "

          kill $XVFB 2>/dev/null || true

      - name: Upload Wikipedia screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webkitium-linux-wikipedia
          path: /tmp/webkitium-linux-wikipedia.png
          if-no-files-found: warn
          retention-days: 14

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-ci-logs
          path: |
            /tmp/xvfb.log
            /tmp/app.log
