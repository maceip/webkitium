name: linux-gtk-build

# Operational rule
# When you re-cut webkit-pin or bump Dawn / vcpkg:
#
# Update config/webkit-build-matrix.json.
# Update config/vcpkg-configuration.json if the Dawn baseline changes.
# Update config/windows-webgpu-dawn-green.json if you use it as a green reference (CI will fail if it disagrees with the matrix).

# WebKit GTK port on the Linux ARM64 self-hosted runner (same pool as android-build).
# Produces arm64 binaries only on this hardware.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-linux-gtk-build
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Linux GTK WebKit Build (arm64)
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Load CI matrix into environment
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/config/ci_matrix_env.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" >> "$GITHUB_ENV"

      - name: Prepare source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          command -v gh >/dev/null 2>&1 || { echo "::error::gh CLI not found"; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "::error::git not found on PATH"; exit 1; }
          SRC="${NG_LINUX_GTK_WEBKIT_SRC:-$HOME/webkit-src-gtk}"
          echo "WEBKIT_SRC=$SRC" >> "$GITHUB_ENV"
          echo "WEBKITIUM_BROWSER_SHELL_TARGET=linux-gtk" >> "$GITHUB_ENV"
          ARCHIVE="${RUNNER_TEMP}/webkit-pin.tar.gz"
          rm -rf "$SRC"
          mkdir -p "$SRC"
          cd "$RUNNER_TEMP"
          gh release download "${WEBKIT_PIN_RELEASE_TAG:?WEBKIT_PIN_RELEASE_TAG missing}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "${WEBKIT_PIN_PART_GLOB:?WEBKIT_PIN_PART_GLOB missing}"
          shopt -s nullglob
          parts=( ${WEBKIT_PIN_PART_GLOB} )
          if (( ${#parts[@]} == 0 )); then
            echo "::error::No tarball parts matched WEBKIT_PIN_PART_GLOB after download"
            exit 1
          fi
          cat "${parts[@]}" > "$ARCHIVE"
          rm -f ${WEBKIT_PIN_PART_GLOB}
          shopt -u nullglob
          [[ -s "$ARCHIVE" ]] || { echo "::error::Stitched webkit-pin archive is empty"; exit 1; }
          tar -xzf "$ARCHIVE" --strip-components=1 -C "$SRC"
          rm -f "$ARCHIVE"
          if [[ ! -d "$SRC/Source" ]]; then
            echo "::error::Extraction failed — Source/ directory missing"
            exit 1
          fi
          python3 "$GITHUB_WORKSPACE/config/verify_webkit_pin_commit.py" \
            --matrix "$GITHUB_WORKSPACE/config/webkit-build-matrix.json" \
            --webkit-root "$SRC"
          for patch in "$GITHUB_WORKSPACE"/webkit/patches/common/*.patch "$GITHUB_WORKSPACE"/webkit/patches/linux/*.patch; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            git -C "$SRC" apply --check --whitespace=nowarn --unidiff-zero "$patch"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$patch"
          done

      - name: Install GTK build dependencies
        run: |
          set -euo pipefail
          SRC="${WEBKIT_SRC:?}"
          if [[ "${NG_SKIP_INSTALL_DEPS:-0}" == "1" ]]; then
            echo "Skipping install-dependencies (NG_SKIP_INSTALL_DEPS=1, AMI pre-baked)"
          elif [[ -f "$SRC/Tools/gtk/install-dependencies" ]]; then
            sudo env DEBIAN_FRONTEND=noninteractive "$SRC/Tools/gtk/install-dependencies"
          else
            echo "::error::Tools/gtk/install-dependencies not found and NG_SKIP_INSTALL_DEPS not set"
            exit 1
          fi
          # OptionsGTK.cmake requires these even when their features are disabled
          sudo apt-get install -y --no-install-recommends \
            libopenxr-dev libbacktrace-dev xdg-dbus-proxy 2>/dev/null || true

      - name: Install librice from source
        run: |
          set -euo pipefail
          # librice is a Rust ICE library required by WebKit GTK's WebRTC.
          # Not packaged for Ubuntu — build from source with cargo-c.
          if pkg-config --atleast-version=0.4.2 rice-proto 2>/dev/null; then
            echo "librice already installed"
          else
            export PATH="$HOME/.cargo/bin:$PATH"
            # Ensure Rust toolchain is installed and default is set
            rustup default stable
            cargo --version
            cargo install cargo-c
            git clone --depth 1 --branch v0.4.2 https://github.com/ystreet/librice.git "$RUNNER_TEMP/librice"
            cd "$RUNNER_TEMP/librice"
            LIBDIR="/usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
            # Build to a local prefix, then sudo copy into /usr
            cargo cbuild --release
            cargo cinstall --release --destdir="$RUNNER_TEMP/rice-install" --prefix=/usr --libdir="$LIBDIR"
            echo "=== destdir contents ==="
            find "$RUNNER_TEMP/rice-install" -type f | head -30
            sudo cp -a "$RUNNER_TEMP/rice-install/usr/." /usr/
            sudo ldconfig
            pkg-config --modversion rice-proto
            pkg-config --modversion rice-io
            echo "librice installed OK"
          fi

      - name: Build
        run: |
          set -euo pipefail
          SRC="${WEBKIT_SRC:?}"
          cd "$SRC"
          JOBS="$(nproc 2>/dev/null || echo 4)"
          export WEBKITIUM_BROWSER_SHELL_TARGET=linux-gtk
          # Thunder (WPE/RDK) is not available on standard Ubuntu
          cp "$GITHUB_WORKSPACE/config/cmake/FindThunder.cmake" "$SRC/Source/cmake/FindThunder.cmake"
          # GCC on ARM64 raises -Werror false positives in WebKit internals
          export CFLAGS="${CFLAGS:-} -Wno-error=stringop-overflow -Wno-error=uninitialized -Wno-error=maybe-uninitialized"
          export CXXFLAGS="${CXXFLAGS:-} -Wno-error=stringop-overflow -Wno-error=uninitialized -Wno-error=maybe-uninitialized"
          perl Tools/Scripts/build-webkit --release --gtk --makeargs="-j$JOBS" \
            -DENABLE_EXPERIMENTAL_FEATURES="${WEBKIT_CMAKE_ENABLE_EXPERIMENTAL_FEATURES:-ON}" \
            -DENABLE_WEBXR="${WEBKIT_CMAKE_ENABLE_WEBXR:-OFF}" \
            -DENABLE_THUNDER=OFF \
            -DENABLE_BUBBLEWRAP_SANDBOX=OFF

      - name: Baseline package
        run: |
          set -euo pipefail
          SRC="${WEBKIT_SRC:?}"
          ROOT="$SRC/WebKitBuild/Release"
          PLATFORM=linux-gtk
          RUN_ID="${GITHUB_RUN_ID:-local}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          mkdir -p "$OUT_ROOT"
          [[ -d "$ROOT" ]] || { echo "::error::Build output dir missing: $ROOT" >&2; exit 1; }
          [[ -d "$ROOT/bin" ]] || { echo "::error::bin/ not found under $ROOT"; exit 1; }
          TAR="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.tar.gz"
          tar -czf "$TAR" -C "$ROOT" bin
          [[ -s "$TAR" ]] || { echo "::error::Baseline tarball empty: $TAR"; exit 1; }
          echo "BASELINE_OK platform=$PLATFORM tar=$TAR"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gtk-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.WEBKIT_SRC }}/WebKitBuild/Release/bin
            ${{ env.WEBKIT_SRC }}/WebKitBuild/Release/CMakeCache.txt
            ${{ runner.temp }}/baseline-packages
          if-no-files-found: warn

      - name: Cleanup source
        if: always()
        run: |
          set -euo pipefail
          d="${WEBKIT_SRC:-}"
          if [[ -n "$d" && "$d" != "/" && "$d" != "$HOME" && "$d" != "$HOME/" ]]; then
            rm -rf "$d"
          fi
