name: linux-gtk-build

# WebKit GTK port on the Linux ARM64 self-hosted runner (same pool as android-build).
# Produces arm64 binaries only on this hardware.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: webkitium-linux-gtk-build
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Linux GTK WebKit Build (arm64)
    runs-on:
      - self-hosted
      - Linux
      - ARM64
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Prepare source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SRC="${NG_LINUX_GTK_WEBKIT_SRC:-$HOME/webkit-src-gtk}"
          echo "WEBKIT_SRC=$SRC" >> "$GITHUB_ENV"
          echo "WEBKITIUM_BROWSER_SHELL_TARGET=linux-gtk" >> "$GITHUB_ENV"
          ARCHIVE="${RUNNER_TEMP}/webkit-pin.tar.gz"
          rm -rf "$SRC"
          mkdir -p "$SRC"
          cd "$RUNNER_TEMP"
          gh release download webkit-pin \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "webkit-pin.tar.gz.part-*"
          parts=( webkit-pin.tar.gz.part-* )
          if (( ${#parts[@]} == 0 )); then
            echo "::error::No tarball parts found after download"
            exit 1
          fi
          cat "${parts[@]}" > "$ARCHIVE"
          rm -f webkit-pin.tar.gz.part-*
          tar -xzf "$ARCHIVE" --strip-components=1 -C "$SRC"
          rm -f "$ARCHIVE"
          if [[ ! -d "$SRC/Source" ]]; then
            echo "::error::Extraction failed — Source/ directory missing"
            exit 1
          fi
          for patch in "$GITHUB_WORKSPACE"/webkit/patches/common/*.patch "$GITHUB_WORKSPACE"/webkit/patches/linux/*.patch; do
            [[ -f "$patch" ]] || continue
            echo "Applying $(basename "$patch")"
            git -C "$SRC" apply --check --whitespace=nowarn --unidiff-zero "$patch"
            git -C "$SRC" apply --whitespace=nowarn --unidiff-zero "$patch"
          done

      - name: Install GTK build dependencies
        run: |
          set -euo pipefail
          SRC="${WEBKIT_SRC:?}"
          if [[ -f "$SRC/Tools/gtk/install-dependencies" ]]; then
            sudo env DEBIAN_FRONTEND=noninteractive "$SRC/Tools/gtk/install-dependencies" || {
              echo "::warning::install-dependencies failed; continuing if the AMI already has GTK deps"
            }
          else
            echo "::warning::Tools/gtk/install-dependencies missing; assuming runner image has deps"
          fi

      - name: Build
        run: |
          set -euo pipefail
          SRC="${WEBKIT_SRC:?}"
          cd "$SRC"
          JOBS="$(nproc 2>/dev/null || echo 4)"
          export WEBKITIUM_BROWSER_SHELL_TARGET=linux-gtk
          perl Tools/Scripts/build-webkit --release --gtk --makeargs="-j$JOBS" \
            -DENABLE_EXPERIMENTAL_FEATURES=ON \
            -DENABLE_WEBXR=OFF

      - name: Baseline package
        run: |
          set -euo pipefail
          SRC="${WEBKIT_SRC:?}"
          ROOT="$SRC/WebKitBuild/Release"
          PLATFORM=linux-gtk
          RUN_ID="${GITHUB_RUN_ID:-local}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          OUT_ROOT="${RUNNER_TEMP}/baseline-packages"
          mkdir -p "$OUT_ROOT"
          stamp() { date -u +%Y-%m-%dT%H:%M:%SZ; }
          [[ -d "$ROOT" ]] || { echo "::error::Build output dir missing: $ROOT" >&2; exit 1; }
          TAR="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.tar.gz"
          if [[ -d "$ROOT/bin" ]]; then
            tar -czf "$TAR" -C "$ROOT" bin
          else
            tar -czf "$TAR" -C "$ROOT" .
          fi
          DMG="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.dmg"
          PKG="$OUT_ROOT/webkit-minibrowser-baseline-${RUN_ID}-${RUN_ATTEMPT}.pkg"
          ln -sf "$(basename "$TAR")" "$DMG" 2>/dev/null || cp "$TAR" "$DMG"
          printf '%s\n' "Linux: PKG placeholder; use .deb/flatpak when ready." >"$PKG"
          export BASELINE_JSON_DIR="$OUT_ROOT"
          export BASELINE_PLATFORM="$PLATFORM"
          export BASELINE_RUN_ID="$RUN_ID"
          export BASELINE_RUN_ATTEMPT="$RUN_ATTEMPT"
          export BASELINE_TARBALL="$(basename "$TAR")"
          export BASELINE_DMG="$(basename "$DMG")"
          export BASELINE_PKG="$(basename "$PKG")"
          export BASELINE_CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python3 <<'PY'
          import json, os, pathlib
          out = pathlib.Path(os.environ["BASELINE_JSON_DIR"]) / f"baseline-{os.environ['BASELINE_PLATFORM']}-{os.environ['BASELINE_RUN_ID']}.json"
          doc = {
              "platform": os.environ["BASELINE_PLATFORM"],
              "created": os.environ["BASELINE_CREATED"],
              "runId": os.environ["BASELINE_RUN_ID"],
              "attempt": os.environ["BASELINE_RUN_ATTEMPT"],
              "tarball": os.environ["BASELINE_TARBALL"],
              "dmgOrArchive": os.environ["BASELINE_DMG"],
              "pkg": os.environ["BASELINE_PKG"],
              "note": "DMG filename reused as symlink to tarball for artifact naming parity with macOS.",
          }
          out.write_text(json.dumps(doc, indent=2))
          PY
          echo "BASELINE_OK platform=$PLATFORM tar=$TAR"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gtk-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.WEBKIT_SRC }}/WebKitBuild/Release/bin
            ${{ env.WEBKIT_SRC }}/WebKitBuild/Release/CMakeCache.txt
            ${{ runner.temp }}/baseline-packages
          if-no-files-found: warn

      - name: Cleanup source
        if: always()
        run: rm -rf "${WEBKIT_SRC:-}"
